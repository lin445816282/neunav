<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萌糖消了个消 - 图标</title>
<script>p5.disableFriendlyErrors = true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
  html, body { margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#1a1028; }
  canvas { border-radius: 28px; box-shadow: 0 0 60px rgba(255,140,200,0.25); }
</style>
</head>
<body>
<script>
const S = 512;

function setup() {
  createCanvas(S, S);
  noLoop();
  drawIcon();
  setTimeout(() => saveCanvas('moe_candy_game_icon', 'png'), 600);
}

function drawIcon() {
  // ─── Background gradient ───
  for (let y = 0; y < S; y++) {
    let t = y / S;
    stroke(lerpColor(color('#1a0a3a'), color('#3d1050'), t));
    strokeWeight(1);
    line(0, y, S, y);
  }
  
  // ─── Sparkle particles ───
  noStroke();
  for (let i = 0; i < 60; i++) {
    let x = random(S), y = random(S);
    fill(255,255,255,random(15,50));
    circle(x, y, random(1.5, 4));
  }
  // Some big glow spots
  for (let i = 0; i < 8; i++) {
    let x = random(80, S-80), y = random(80, S-80);
    let c = random([[255,180,100],[200,140,255],[100,200,255],[255,140,180]]);
    fill(c[0],c[1],c[2],random(3,8));
    circle(x, y, random(30, 70));
  }
  
  // ─── Main character: BIG candy face (center, slightly up) ───
  let cx = S/2, cy = 160, r = 95;
  
  // Glow behind
  for (let i = 4; i > 0; i--) {
    fill(255,180,80, i*8);
    noStroke();
    circle(cx, cy, r*2.2 + i*10);
  }
  
  // Candy body
  noStroke();
  fill(255, 150, 60);
  circle(cx, cy, r*2);
  // Gradient highlight
  fill(255, 200, 140, 120);
  circle(cx-20, cy-25, r*1.2);
  fill(255, 255, 255, 50);
  circle(cx-28, cy-35, r*0.5);
  
  // ─── Eyes (big cute) ───
  // Left eye
  fill('#1a1a1a');
  ellipse(cx-30, cy-10, 24, 28);
  fill('#fff');
  circle(cx-24, cy-18, 10);
  circle(cx-34, cy-6, 4);
  
  // Right eye
  fill('#1a1a1a');
  ellipse(cx+30, cy-10, 24, 28);
  fill('#fff');
  circle(cx+36, cy-18, 10);
  circle(cx+26, cy-6, 4);
  
  // ─── Blush ───
  fill(255, 120, 120, 70);
  ellipse(cx-48, cy+10, 22, 12);
  ellipse(cx+48, cy+10, 22, 12);
  
  // ─── Mouth (happy open smile) ───
  fill('#1a1a1a');
  arc(cx, cy+14, 32, 22, 0, PI);
  fill('#ff6b8a');
  arc(cx, cy+12, 28, 16, 0, PI);
  
  // ─── Small candy buddies around ───
  let buddies = [
    {x: 80, y: 280, r: 38, hue: 280, face:'wink'},
    {x: 432, y: 280, r: 38, hue: 200, face:'cool'},
    {x: 90, y: 420, r: 35, hue: 30, face:'happy'},
    {x: 422, y: 420, r: 35, hue: 340, face:'shy'},
    {x: 256, y: 440, r: 42, hue: 140, face:'star'},
  ];
  
  buddies.forEach(b => {
    colorMode(HSB, 360, 100, 100, 100);
    noStroke();
    // Shadow
    fill(0,0,0,25);
    circle(b.x+2, b.y+2, b.r*2);
    // Body
    fill(b.hue, 70, 90);
    circle(b.x, b.y, b.r*2);
    // Highlight
    fill(b.hue, 40, 95, 50);
    circle(b.x-b.r*0.2, b.y-b.r*0.25, b.r*1.1);
    fill(255,255,255,40);
    circle(b.x-b.r*0.25, b.y-b.r*0.32, b.r*0.4);
    
    colorMode(RGB, 255);
    // Eyes
    let es = b.r*0.28;
    fill('#1a1a1a');
    if (b.face === 'wink') {
      ellipse(b.x-8, b.y-3, es, es*1.2);
      // Winking eye
      let ew = b.r*0.18;
      arc(b.x+8, b.y-1, ew, ew*0.3, 0, PI);
    } else {
      ellipse(b.x-8, b.y-3, es, es*1.15);
      ellipse(b.x+8, b.y-3, es, es*1.15);
    }
    // Eye shine
    fill('#fff');
    circle(b.x-6, b.y-7, es*0.4);
    circle(b.x+10, b.y-7, es*0.4);
    
    // Mouth
    if (b.face === 'cool') {
      stroke('#1a1a1a'); strokeWeight(2);
      noFill();
      arc(b.x, b.y+8, b.r*0.4, b.r*0.2, 0.2, PI-0.2);
      noStroke();
    } else if (b.face === 'shy') {
      fill('#1a1a1a');
      arc(b.x, b.y+8, b.r*0.25, b.r*0.22, PI, TWO_PI);
    } else if (b.face === 'star') {
      // Star eyes
      fill('#fbbf24');
      drawStar(b.x-8, b.y-2, 6, 3, 5);
      drawStar(b.x+8, b.y-2, 6, 3, 5);
    } else {
      fill('#1a1a1a');
      arc(b.x, b.y+4, b.r*0.3, b.r*0.18, 0, PI);
    }
    
    // Blush
    fill(255,120,160,60);
    noStroke();
    ellipse(b.x-b.r*0.5, b.y+5, b.r*0.25, b.r*0.15);
    ellipse(b.x+b.r*0.5, b.y+5, b.r*0.25, b.r*0.15);
  });
  
  // ─── Score / game info bar ───
  noStroke();
  fill(0,0,0,100);
  rect(0, S-58, S, 58);
  
  // Score display
  textAlign(CENTER);
  textSize(22);
  textStyle(BOLD);
  fill('#fbbf24');
  text('⭐ 1,280  🪙 42', S/2, S-26);
  
  // Level
  textAlign(LEFT);
  textSize(13);
  fill('#c7d2fe');
  text('第 7 关', 20, S-28);
  
  // Props indicator
  textAlign(RIGHT);
  textSize(11);
  fill('#94a3b8');
  text('↩️5 💣3 👁️3', S-20, S-28);
  
  // ─── Board backdrop (subtle) ───
  // Small checkerboard pattern behind candies
  noFill();
  stroke(255,255,255,4);
  strokeWeight(0.5);
  let bs = 30;
  for (let x = 60; x < S-60; x += bs) {
    for (let y = 260; y < S-80; y += bs) {
      rect(x, y, bs, bs);
    }
  }
  
  // ─── Combo pop text ───
  fill('#fbbf24');
  textAlign(CENTER);
  textSize(16);
  textStyle(BOLD);
  text('🔥 COMBO ×3!', S/2-30, 300);
  
  // ─── Corner decorations ───
  stroke(255,255,255,30);
  strokeWeight(2);
  noFill();
  arc(16, 16, 20, 20, 0, PI/2);
  arc(S-16, 16, 20, 20, PI/2, PI);
  arc(16, S-16, 20, 20, -PI/2, 0);
  arc(S-16, S-16, 20, 20, PI, PI*1.5);
}

function drawStar(x, y, r1, r2, n) {
  beginShape();
  for (let i = 0; i < n*2; i++) {
    let a = -PI/2 + i*PI/n;
    let r = i%2===0 ? r1 : r2;
    vertex(x+cos(a)*r, y+sin(a)*r);
  }
  endShape(CLOSE);
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('moe_candy_game_icon', 'png');
}
</script>
</body>
</html>
