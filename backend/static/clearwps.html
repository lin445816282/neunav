<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    background: linear-gradient(180deg, #f0f9ff 0%, #f8fafc 40%, #f0f4ff 100%);

    min-height: 100vh;

  }

  /* ─── 顶部彩条 ─── */
  .top-strip {
    height: 4px;
    background: linear-gradient(90deg, #0ea5e9, #6366f1, #06b6d4);
  }

  /* ─── 主体 ─── */
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 30px 24px 40px;
    text-align: center;
  }

  /* ─── 图标 ─── */
  .icon-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #e0f2fe, #e0e7ff);
    border-radius: 14px;
    margin-bottom: 18px;
    box-shadow: 0 2px 12px rgba(14,165,233,0.1);

  /* ─── 标题 ─── */
  h1 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
    color: #0f172a;
  }
  .subhead {
    font-size: 16px;
    color: #64748b;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .subhead strong { color: #0ea5e9; font-weight: 700; }

  /* ─── 方式标签 ─── */
  .method-label {
    font-size: 12px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    margin-top: 10px;

  .method-label:first-of-type { margin-top: 0; }

  /* ─── 下载按钮 ─── */

    display: inline-flex;
    align-items: center;
    justify-content: center;

    width: 100%;

    font-size: 18px;

  /* ─── 复制代码 ─── */
  .btn-copy {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 500;
    color: #64748b;
    background: none;
    border: none;

    padding: 8px 16px;

    justify-content: center;

    gap: 8px;
    background: #fffbeb;

    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #f1f5f9;

<script>
// ═══════ 返回导航拖拽 ═══════
(function(){
  const nav=document.getElementById('backNav');
  const close=document.getElementById('bnClose');
  let dragging=false,ox=0,oy=0,nx=0,ny=0;
  close.addEventListener('click',e=>{e.stopPropagation();nav.classList.add('hide')});
  nav.addEventListener('pointerdown',e=>{
    if(e.target===close)return;
    dragging=true;nav.style.transition='none';
    const r=nav.getBoundingClientRect();
    ox=e.clientX-r.left;oy=e.clientY-r.top;
    nav.setPointerCapture(e.pointerId);
  });
  nav.addEventListener('pointermove',e=>{
    if(!dragging)return;
    nx=e.clientX-ox;ny=e.clientY-oy;
    nav.style.left=nx+'px';nav.style.top=ny+'px';nav.style.transform='none';
  });
  nav.addEventListener('pointerup',()=>{
    dragging=false;nav.style.transition='box-shadow .2s,opacity .3s';
  });
})();

const BAT_TEXT = "@echo off\r\ncd /d C:\\ \r\nchcp 936 >nul\r\nsetlocal enabledelayedexpansion\r\n\r\necho.\r\necho   +-------------------------------------+\r\necho   ^|   WPS \u7f13\u5b58\u4e00\u952e\u6e05\u7406\u5de5\u5177 v2.0          ^|\r\necho   ^|   \u7eaf Bat - \u96f6\u4f9d\u8d56 - \u53cc\u51fb\u5373\u7528         ^|\r\necho   +-------------------------------------+\r\necho.\r\necho   \u7528\u6237: %USERNAME%\r\necho.\r\n\r\n:: --- 1. \u5173\u95ed WPS \u8fdb\u7a0b ---\r\necho   [1/3] \u5173\u95ed WPS \u8fdb\u7a0b...\r\n\r\nset \"killed=\"\r\nfor %%p in (wps.exe wpsoffice.exe et.exe wpp.exe wpspdf.exe wpscloudsvr.exe wpscenter.exe wpsmain.exe wpsupdate.exe) do (\r\n    taskkill /f /im %%p >nul 2>&1\r\n    if !errorlevel! equ 0 (\r\n        if defined killed (set \"killed=!killed!, %%p\") else (set \"killed=%%p\")\r\n    )\r\n)\r\nif defined killed (\r\n    echo         \u5df2\u7ec8\u6b62: !killed!\r\n) else (\r\n    echo         \u6ca1\u6709\u8fd0\u884c\u4e2d\u7684 WPS \u8fdb\u7a0b\r\n)\r\n\r\n:: --- 2. \u6e05\u7406\u7f13\u5b58 ---\r\necho.\r\necho   [2/3] \u6e05\u7406\u7f13\u5b58\u76ee\u5f55...\r\n\r\nset \"ROAMING=%APPDATA%\\Kingsoft\\office6\"\r\nset \"ok=0\"\r\nset \"skip=0\"\r\n\r\nfor %%D in (\r\n    \"backup\" \"cache\" \"log\" \"mediacache\" \"trace\"\r\n    \"update\" \"tiance\" \"kccsdkbak\"\r\n) do (\r\n    set \"DIR=%ROAMING%\\%%~D\"\r\n    if exist \"!DIR!\" (\r\n        rd /s /q \"!DIR!\" 2>nul\r\n        if exist \"!DIR!\" (\r\n            echo         X %%~D   \u8df3\u8fc7 ^(\u90e8\u5206\u6587\u4ef6\u88ab\u5360\u7528^)\r\n            set /a skip+=1\r\n        ) else (\r\n            echo         V %%~D   \u5df2\u6e05\u7406\r\n            set /a ok+=1\r\n        )\r\n    )\r\n)\r\n\r\n:: \u4e34\u65f6\u76ee\u5f55\r\nfor %%T in (wps wpsremixsdk) do (\r\n    set \"TDIR=%LOCALAPPDATA%\\Temp\\%%T\"\r\n    if exist \"!TDIR!\" (\r\n        rd /s /q \"!TDIR!\" 2>nul\r\n        if exist \"!TDIR!\" (\r\n            echo         X Temp/%%T   \u8df3\u8fc7\r\n            set /a skip+=1\r\n        ) else (\r\n            echo         V Temp/%%T   \u5df2\u6e05\u7406\r\n            set /a ok+=1\r\n        )\r\n    )\r\n)\r\n\r\n:: --- 3. \u4e91\u6587\u4ef6\u7f13\u5b58 ---\r\necho.\r\necho   [3/3] \u6e05\u7406\u4e91\u6587\u4ef6\u7f13\u5b58...\r\n\r\nset \"CLOUD=%LOCALAPPDATA%\\Kingsoft\\WPS Cloud Files\"\r\nif not exist \"%CLOUD%\" (\r\n    echo         \u672a\u627e\u5230WPS Cloud Files\u76ee\u5f55\r\n    goto :done\r\n)\r\n\r\nfor /d %%H in (\"%CLOUD%\\.*\" \"%CLOUD%\\~*\") do (\r\n    if exist \"%%H\" (\r\n        rd /s /q \"%%H\" 2>nul\r\n        if exist \"%%H\" (\r\n            echo         X %%~nxH   \u8df3\u8fc7\r\n            set /a skip+=1\r\n        ) else (\r\n            echo         V %%~nxH   \u5df2\u6e05\u7406\r\n            set /a ok+=1\r\n        )\r\n    )\r\n)\r\n\r\n:done\r\n:: --- \u7ed3\u679c ---\r\necho.\r\necho   ==========================================\r\nif %ok% equ 0 if %skip% equ 0 (\r\n    echo   OK WPS \u7f13\u5b58\u5df2\u7ecf\u5f88\u5e72\u51c0\uff0c\u65e0\u9700\u6e05\u7406\uff01\r\n) else (\r\n    echo   OK \u5b8c\u6210\uff01\u5df2\u6e05\u7406 %ok% \u4e2a\u76ee\u5f55\r\n    if %skip% gtr 0 echo   !! %skip% \u4e2a\u76ee\u5f55\u8df3\u8fc7 ^(\u6587\u4ef6\u88abWPS\u5360\u7528^)\r\n)\r\necho   ==========================================\r\necho.\r\necho   \u6309\u4efb\u610f\u952e\u5173\u95ed...\r\npause >nul\r\nexit /b";

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function doDownload() {
  var raw = atob(BAT_BASE64);
  var bytes = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  var blob = new Blob([bytes], { type: 'application/octet-stream' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'WPS\u6e05\u7406.bat';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('\u2714 \u4e0b\u8f7d\u6210\u529f\uff01\u627e\u5230\u6587\u4ef6\u53cc\u51fb\u8fd0\u884c');
}

function copyCode() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(BAT_TEXT).then(function() {
      toast('\u2714 \u5df2\u590d\u5236\uff01\u6253\u5f00\u8bb0\u4e8b\u672c\u7c98\u8d34\uff0c\u4fdd\u5b58\u4e3a WPS\u6e05\u7406.bat');
    }).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
}

function fallbackCopy() {
  var ta = document.createElement('textarea');
  ta.value = BAT_TEXT;
  ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  toast('\u2714 \u5df2\u590d\u5236\uff01');
}

    navigator.clipboard.writeText(url).then(function(){
      toast('\u2714 \u94fe\u63a5\u5df2\u590d\u5236\uff0c\u53d1\u7ed9\u670b\u53cb\u5373\u53ef');
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('\u2714 \u5df2\u590d\u5236');
  }
}
