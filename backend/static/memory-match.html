<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>🃏 记忆翻牌 - 小游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f3e5f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;color:#333;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.header{width:100%;max-width:420px;padding:16px;text-align:center}
.header .icon{font-size:48px;display:block;margin-bottom:4px}
.header h1{font-size:22px;color:#ab47bc;margin:0}
.header .sub{font-size:13px;color:#888;margin-top:4px}
.score-bar{display:flex;justify-content:space-around;width:100%;max-width:420px;padding:8px 16px}
.score-item{text-align:center}
.score-item .label{font-size:11px;color:#888}
.score-item .value{font-size:20px;font-weight:700;color:#ab47bc}
.game-area{flex:1;width:100%;max-width:420px;padding:8px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.coming-soon{text-align:center;padding:40px 20px;color:#aaa}
.coming-soon .cs-icon{font-size:64px;margin-bottom:16px}
.coming-soon h2{font-size:20px;color:#666;margin-bottom:8px}
.coming-soon p{font-size:14px;line-height:1.6}
.bottom-bar{width:100%;max-width:420px;padding:12px 16px;display:flex;gap:10px;justify-content:center}
.btn{flex:1;max-width:160px;padding:12px;border:none;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(.95)}
.btn-primary{background:#ab47bc;color:#fff}
.btn-outline{background:transparent;color:#ab47bc;border:2px solid #ab47bc}
.btn-ghost{background:rgba(0,0,0,.05);color:#666}
.footer{font-size:10px;color:#aaa;padding:8px;text-align:center}

#cardGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:320px;margin:0 auto}
.card{aspect-ratio:1;background:linear-gradient(135deg,#ab47bc,#7b1fa2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;color:transparent;transition:all .3s}
.card.flipped{background:#fff;color:#333;border:2px solid #ce93d8}
</style>
</head>
<body>

<div class="header">
  <span class="icon">🃏</span>
  <h1>记忆翻牌</h1>
  <div class="sub">翻牌配对相同图案，考验记忆力</div>
</div>

<div class="score-bar">
  <div class="score-item">
    <div class="label">🏆 最高分</div>
    <div class="value" id="bestScore">0</div>
  </div>
  <div class="score-item">
    <div class="label">📊 当前分</div>
    <div class="value" id="currentScore">0</div>
  </div>
</div>

<div class="game-area" id="gameArea">
<div id="cardGrid">
</div>
</div>

<div class="bottom-bar">
  <button class="btn btn-outline" id="btnRestart">🔄 重新开始</button>
  <button class="btn btn-primary" id="btnBack">🏠 游戏大厅</button>
</div>

<div class="footer">仅供娱乐 · 适度游戏益脑</div>

<script>

// Navigation
document.getElementById('btnBack').addEventListener('click',()=>{location.href='/nav'});
document.getElementById('btnRestart').addEventListener('click',()=>{location.reload()});

// Canvas init for canvas-based games
const canvas = document.getElementById('gameCanvas');


const cardGrid = document.getElementById('cardGrid');
const symbols = ['🍎','🍊','🍋','🍇','🍓','🍒','🥝','🍑'];
let cards = [...symbols,...symbols].sort(()=>Math.random()-.5);
let flipped = [];
cards.forEach((s,i)=>{
  const card = document.createElement('div');
  card.className = 'card';
  card.textContent = s;
  card.dataset.symbol = s;
  card.addEventListener('click',function(){
    if(this.classList.contains('flipped')||flipped.length>=2)return;
    this.classList.add('flipped');
    flipped.push(this);
    if(flipped.length===2){
      if(flipped[0].dataset.symbol===flipped[1].dataset.symbol){
        flipped=[];
      }else{
        setTimeout(()=>{flipped.forEach(c=>c.classList.remove('flipped'));flipped=[];},800);
      }
    }
  });
  cardGrid.appendChild(card);
});
</script>
</body>
</html>
