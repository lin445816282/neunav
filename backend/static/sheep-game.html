<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🐑 羊了个羊</title>
<style>
:root {
  --bg: #e8f5e9; --card: #fff;
  --green: #66bb6a; --dark: #2e7d32;
  --slot-bg: #c8e6c9; --slot-border: #a5d6a7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:#333;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
  overflow-x:hidden;
}

/* Header */
.header{padding:12px 16px 4px;text-align:center;width:100%;max-width:420px}
.header .title{font-size:20px;font-weight:700;color:var(--dark);display:flex;align-items:center;justify-content:center;gap:8px}
.header .sub{font-size:11px;color:#888;margin-top:2px}

/* Score */
.score-bar{display:flex;justify-content:space-between;width:100%;max-width:420px;padding:4px 16px}
.score-item{text-align:center;flex:1}
.score-item .label{font-size:10px;color:#888}
.score-item .value{font-size:16px;font-weight:700;color:var(--green)}

/* Board */
#board-wrap{flex:1;width:100%;max-width:420px;display:flex;align-items:center;justify-content:center;padding:4px 8px}
#board{position:relative;width:min(340px,90vw);height:min(300px,42vh);background:radial-gradient(ellipse at center,rgba(102,187,106,.08),transparent 70%);border-radius:12px;overflow:visible}

.tile{position:absolute;width:48px;height:48px;background:var(--card);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:transform .15s,opacity .2s,box-shadow .15s;box-shadow:2px 2px 8px rgba(0,0,0,.15);border:2px solid #e0e0e0}
.tile.covered{opacity:.45;pointer-events:none;box-shadow:none;filter:brightness(.7)}
.tile:not(.covered):active{transform:scale(.92)}
.tile.flash{animation:tileFlash .4s ease}

@keyframes tileFlash{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.15);filter:brightness(1.3)}
}

/* Slot bar */
#slot-wrap{width:100%;max-width:420px;padding:8px 16px 12px}
#slot-bar{display:flex;gap:6px;justify-content:center;background:rgba(102,187,106,.08);padding:10px 8px;border-radius:14px;border:2px dashed var(--slot-border)}
.slot{width:min(40px,11vw);height:min(40px,11vw);background:var(--slot-bg);border-radius:10px;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .2s}
.slot.filled{background:#fff;border-color:var(--green);box-shadow:0 2px 4px rgba(0,0,0,.1)}
.slot.match{animation:matchPop .35s ease}

@keyframes matchPop{
  0%{transform:scale(1)}
  30%{transform:scale(1.3);filter:brightness(1.5)}
  100%{transform:scale(0);opacity:0}
}

/* Tools */
#tool-bar{display:flex;gap:8px;justify-content:center;width:100%;max-width:420px;padding:0 16px 8px}
.tool-btn{flex:1;max-width:100px;padding:10px 0;border:none;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:#fff;color:#666;border:1px solid #ddd;display:flex;flex-direction:column;align-items:center;gap:2px}
.tool-btn:active{transform:scale(.94)}
.tool-btn .tb-count{font-size:10px;color:#999}
.tool-btn:disabled{opacity:.35;pointer-events:none}

/* Bottom */
#bottom-bar{display:flex;gap:8px;width:100%;max-width:420px;padding:8px 16px 16px}
.btn{flex:1;padding:12px;border:none;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.94)}
.btn-green{background:var(--green);color:#fff}
.btn-outline{background:transparent;color:var(--green);border:2px solid var(--green)}
.footer{font-size:10px;color:#aaa;padding:0 0 12px}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .3s}
.overlay .modal{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;max-width:300px;width:90%;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
.overlay .modal .m-icon{font-size:56px;margin-bottom:12px}
.overlay .modal h2{font-size:20px;margin-bottom:8px;color:var(--dark)}
.overlay .modal p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6}
.overlay .modal .btn{width:100%}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* Particle */
.particle{position:fixed;pointer-events:none;font-size:24px;z-index:200;animation:particleFly .6s ease-out forwards}
@keyframes particleFly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}
}

/* Toast */
#toast{position:fixed;top:20%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="title"><span>🐑</span>羊了个羊<span>🌾</span></div>
  <div class="sub" id="levelName">🌱 新手村 · 第1关</div>
</div>

<div class="score-bar">
  <div class="score-item"><div class="label">🏆 最高关</div><div class="value" id="best">1</div></div>
  <div class="score-item"><div class="label">📊 剩余</div><div class="value" id="remain">0</div></div>
  <div class="score-item"><div class="label">🔥 连击</div><div class="value" id="streak">0</div></div>
</div>

<div id="board-wrap"><div id="board"></div></div>

<div id="slot-wrap"><div id="slot-bar">
  <div class="slot"></div><div class="slot"></div><div class="slot"></div>
  <div class="slot"></div><div class="slot"></div><div class="slot"></div>
  <div class="slot"></div>
</div></div>

<div id="tool-bar">
  <button class="tool-btn" id="tbShuffle" onclick="doShuffle()">
    🔀<span class="tb-count" id="cntShuffle">3</span>
  </button>
  <button class="tool-btn" id="tbUndo" onclick="doUndo()">
    ↩️<span class="tb-count" id="cntUndo">3</span>
  </button>
  <button class="tool-btn" id="tbPeek" onclick="doPeek()">
    👁️<span class="tb-count" id="cntPeek">3</span>
  </button>
</div>

<div id="bottom-bar">
  <button class="btn btn-outline" onclick="restart()">🔄 再来一局</button>
  <button class="btn btn-green" onclick="location.href='/nav'">🏠 游戏大厅</button>
</div>
<div class="footer">适度游戏益脑 · 沉迷伤身</div>

<div id="toast"></div>

<script>
// ═══════ Game State ═══════
const TYPES = ['🐑','🐏','🐐','🐄','🐖','🐓','🦆','🐕','🐈','🐇','🌽','🥕','🍎','🍞','⭐','🌙'];
const BOARD_W = 340, BOARD_H = 300;
const TILE_S = 48;
const MAX_SLOTS = 7;

// Level config: each level uses #types × 3 tiles
const LEVELS = [
  {types:5, layers:1, name:'🌱 新手村'},   // 1: 15 tiles, 1 layer
  {types:6, layers:1, name:'🌿 绿草地'},   // 2: 18 tiles
  {types:7, layers:2, name:'🌾 麦田'},     // 3: 21 tiles, 2 layers
  {types:8, layers:2, name:'🍀 幸运草'},   // 4: 24 tiles
  {types:10,layers:2, name:'🌻 向日葵'},   // 5: 30 tiles
  {types:12,layers:3, name:'🌳 大森林'},   // 6: 36 tiles, 3 layers
  {types:14,layers:3, name:'🏔️ 高山上'},  // 7: 42 tiles
  {types:15,layers:3, name:'🌌 星空顶'},   // 8: 45 tiles
];

let level = parseInt(localStorage.getItem('sheep_level')||'1');
let tiles = [];
let slots = [];
let streak = 0;
let bestLevel = parseInt(localStorage.getItem('sheep_best_level')||'1');
let totalCleared = 0;
let tools = {shuffle:3, undo:3, peek:3};
let undoStack = [];

document.getElementById('best').textContent = bestLevel;

// ═══════ Solvability Check ═══════
// Greedy simulation: try to clear all tiles given slot limit
function isSolvable(tiles, numTypes){
  const sim = tiles.map(t=>({...t}));
  const simSlots = [];
  let attempts = 0;
  const maxAttempts = tiles.length * 3;
  
  while(sim.length > 0 && attempts < maxAttempts){
    attempts++;
    // Find an uncovered tile whose type already has 2 in slots
    let found = false;
    for(const t of sim){
      if(isCoveredSim(t, sim)) continue;
      const count = simSlots.filter(s=>s===t.type).length;
      if(count >= 2){
        // Match! Remove this tile and clear the 2 from slots
        simSlots.push(t.type);
        // Remove matching tiles from slots
        let removed = 0;
        for(let i=simSlots.length-1;i>=0;i--){
          if(simSlots[i]===t.type && removed<2){simSlots.splice(i,1);removed++;}
        }
        sim.splice(sim.indexOf(t),1);
        found = true;
        break;
      }
    }
    if(found) continue;
    
    // No match available — must pick a new tile
    // Check if slots would overflow
    if(simSlots.length >= MAX_SLOTS - 1) return false;
    
    // Pick an uncovered tile (prefer one that matches an existing slot count)
    let best = null;
    for(const t of sim){
      if(isCoveredSim(t, sim)) continue;
      const count = simSlots.filter(s=>s===t.type).length;
      if(count >= 1){best=t;break;} // prefer partial match
      if(!best) best=t;
    }
    if(!best) return false; // all covered, stuck
    
    simSlots.push(best.type);
    sim.splice(sim.indexOf(best),1);
    
    // Check if 3-match in slots
    const slotCounts = {};
    simSlots.forEach(s=>slotCounts[s]=(slotCounts[s]||0)+1);
    for(const [type,cnt] of Object.entries(slotCounts)){
      if(cnt>=3){
        let r=0;
        for(let i=simSlots.length-1;i>=0;i--){
          if(simSlots[i]===type&&r<3){simSlots.splice(i,1);r++;}
        }
      }
    }
  }
  return sim.length === 0;
}

function isCoveredSim(tile, tilesArr){
  for(const t of tilesArr){
    if(t.layer <= tile.layer) continue;
    const dx=Math.abs(t.x-tile.x),dy=Math.abs(t.y-tile.y);
    if(dx<TILE_S*0.75&&dy<TILE_S*0.75)return true;
  }
  return false;
}

// ═══════ Tile Generation ═══════
function generateTiles(){
  const cfg = LEVELS[Math.min(level-1, LEVELS.length-1)];
  const numTypes = cfg.types;
  const numLayers = cfg.layers;
  
  // Retry until solvable (max 50 attempts)
  for(let attempt=0; attempt<50; attempt++){
    tiles=[];
    const usedTypes=[...TYPES].sort(()=>Math.random()-.5).slice(0,numTypes);
    let pool=[];
    usedTypes.forEach(t=>{for(let i=0;i<3;i++)pool.push(t)});
    for(let i=pool.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [pool[i],pool[j]]=[pool[j],pool[i]];
    }
    
    let id=0;
    const total=pool.length;
    
    // Calculate tiles per layer
    const perLayer=Math.floor(total/numLayers);
    let remaining=total;
    
    for(let l=0;l<numLayers;l++){
      const count=(l===numLayers-1)?remaining:perLayer;
      remaining-=count;
      const offset=l*20;
      const cols=Math.ceil(Math.sqrt(count*1.5));
      const rows=Math.ceil(count/cols);
      const spacing=Math.min(56,Math.floor((BOARD_W-offset*2)/cols));
      const startX=offset+Math.floor((BOARD_W-offset*2-cols*spacing)/2);
      const startY=offset+Math.floor((BOARD_H-offset*2-rows*spacing)/2);
      
      for(let i=0;i<count;i++){
        const c=i%cols,r=Math.floor(i/cols);
        tiles.push({
          id:id++,type:pool.pop(),
          x:startX+c*spacing,y:startY+r*spacing,
          layer:l
        });
      }
    }
    
    // Solvability check (skip for 1-layer which is always solvable)
    if(numLayers===1||isSolvable([...tiles],numTypes)){
      return; // valid layout
    }
  }
  // Fallback: regenerate with fewer layers if needed
  generateTilesFallback();
}

function generateTilesFallback(){
  tiles=[];
  const usedTypes=[...TYPES].sort(()=>Math.random()-.5).slice(0,5);
  let pool=[];
  usedTypes.forEach(t=>{for(let i=0;i<3;i++)pool.push(t)});
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  let id=0;
  const cols=6,spacing=Math.min(52,Math.floor(BOARD_W/cols));
  for(let i=0;i<pool.length;i++){
    tiles.push({id:id++,type:pool.pop(),x:20+(i%cols)*spacing,y:20+Math.floor(i/cols)*48,layer:0});
  }
}

// ═══════ Cover Detection ═══════
function isCovered(tile){
  for(const t of tiles){
    if(t.layer <= tile.layer) continue;
    // Check overlap
    const dx = Math.abs(t.x - tile.x);
    const dy = Math.abs(t.y - tile.y);
    if(dx < TILE_S * 0.75 && dy < TILE_S * 0.75) return true;
  }
  return false;
}

// ═══════ Rendering ═══════
function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  
  // Sort by layer for rendering
  const sorted = [...tiles].sort((a,b)=>a.layer-b.layer || a.y-b.y || a.x-b.x);
  
  sorted.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tile';
    if(isCovered(t)) el.classList.add('covered');
    el.textContent = t.type;
    el.style.left = t.x + 'px';
    el.style.top = t.y + 'px';
    el.style.zIndex = t.layer * 10;
    
    if(!isCovered(t)){
      el.addEventListener('click', (e) => onTileClick(t, e));
    }
    
    t.el = el;
    board.appendChild(el);
  });
  
  document.getElementById('remain').textContent = tiles.length;
}

function renderSlots(){
  const bar = document.getElementById('slot-bar');
  const slotEls = bar.querySelectorAll('.slot');
  slotEls.forEach((el, i) => {
    if(i < slots.length){
      el.textContent = slots[i].type;
      el.classList.add('filled');
    }else{
      el.textContent = '';
      el.classList.remove('filled');
    }
    el.classList.remove('match');
  });
  
  // Update tool counts
  document.getElementById('cntShuffle').textContent = tools.shuffle;
  document.getElementById('cntUndo').textContent = tools.undo;
  document.getElementById('cntPeek').textContent = tools.peek;
  document.getElementById('tbShuffle').disabled = tools.shuffle <= 0;
  document.getElementById('tbUndo').disabled = tools.undo <= 0;
  document.getElementById('tbPeek').disabled = tools.peek <= 0;
}

// ═══════ Game Logic ═══════
function onTileClick(tile, event){
  // Block if slots already full
  if(slots.length >= 7) return;
  
  // Save undo state
  undoStack.push({tileId: tile.id, slotsBefore: [...slots.map(s=>({type:s.type}))]});
  
  // Add to slots
  slots.push({type: tile.type});
  
  // Remove from board
  tiles = tiles.filter(t => t.id !== tile.id);
  tile.el.classList.add('flash');
  setTimeout(() => tile.el.remove(), 400);
  
  // Check for 3-match
  checkMatch();
  
  // Re-render
  renderBoard();
  renderSlots();
  
  // Check game state
  checkGameState();
}

function checkMatch(){
  let matched = false;
  // Loop: handle sequential matches (removing one set might reveal another)
  while(true){
    const counts = {};
    slots.forEach(s => {counts[s.type]=(counts[s.type]||0)+1});
    let found = null;
    for(const [type,count] of Object.entries(counts)){
      if(count>=3){found=type;break;}
    }
    if(!found) break;
    matched=true;
    
    // Remove all 3 of this type
    let removed=0;
    slots=slots.filter(s=>{
      if(s.type===found&&removed<3){removed++;return false;}
      return true;
    });
    
    // Score & streak
    streak++;totalCleared+=3;
    if(streak>1) toast(`${streak}连击! 🔥`);
    spawnParticles(found);
    document.getElementById('streak').textContent=streak;
    
    // Update best
    if(level>bestLevel){
      bestLevel=level;
      localStorage.setItem('sheep_best_level',bestLevel);
      document.getElementById('best').textContent=bestLevel;
    }
  }
  
  if(matched){
    // Animate and re-render
    const slotEls=document.getElementById('slot-bar').querySelectorAll('.slot');
    slotEls.forEach(el=>{if(el.classList.contains('filled'))el.classList.add('match')});
    setTimeout(renderSlots,350);
  }
}

function checkGameState(){
  if(tiles.length === 0 && slots.length === 0){
    // Win! Advance level
    level++;
    if(level > bestLevel){
      bestLevel = level;
      localStorage.setItem('sheep_best_level', bestLevel);
      document.getElementById('best').textContent = bestLevel;
    }
    localStorage.setItem('sheep_level', level);
    setTimeout(() => showOverlay('🎉', '恭喜通关!',
      `通过第 ${level-1} 关!\n消除 ${totalCleared} 张牌`,
      true), 500);
  }else if(tiles.length === 0 && slots.length > 0 && !hasMatch()){
    setTimeout(() => showOverlay('😵', '卡住了!', `牌已取完但槽内无三消`, false), 500);
  }else if(slots.length >= MAX_SLOTS){
    if(!hasMatch()){
      setTimeout(() => showOverlay('💔', '游戏结束', `槽位已满! 消除 ${totalCleared} 张`, false), 500);
    }
  }
}

function hasMatch(){
  const counts = {};
  slots.forEach(s => counts[s.type] = (counts[s.type]||0) + 1);
  return Object.values(counts).some(c => c >= 3);
}

// ═══════ Tools ═══════
function doShuffle(){
  if(tools.shuffle <= 0 || tiles.length === 0) return;
  tools.shuffle--;
  // Shuffle tile positions
  const positions = tiles.map(t => ({x:t.x, y:t.y}));
  for(let i=positions.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [positions[i],positions[j]]=[positions[j],positions[i]];
  }
  tiles.forEach((t,i)=>{t.x=positions[i].x; t.y=positions[i].y});
  renderBoard();
  renderSlots();
  toast('已打乱顺序 🔀');
}

function doUndo(){
  if(tools.undo <= 0 || undoStack.length === 0) return;
  tools.undo--;
  const last = undoStack.pop();
  // Restore tile
  const removedFromBoard = slots[slots.length-1];
  if(!removedFromBoard) return;
  
  const tileId = last.tileId;
  // Find the last position (approximate - we just put it back somewhere)
  const freeSpots = [];
  for(let y=20;y<BOARD_H-40;y+=48){
    for(let x=20;x<BOARD_W-40;x+=48){
      const occupied = tiles.some(t => Math.abs(t.x-x)<40 && Math.abs(t.y-y)<40);
      if(!occupied) freeSpots.push({x,y});
    }
  }
  if(freeSpots.length > 0){
    const spot = freeSpots[Math.floor(Math.random()*freeSpots.length)];
    tiles.push({id:tileId, type:removedFromBoard.type, x:spot.x, y:spot.y, layer:0});
    slots.pop();
  }
  
  renderBoard();
  renderSlots();
  toast('已撤销 ↩️');
}

function doPeek(){
  if(tools.peek <= 0) return;
  tools.peek--;
  // Briefly highlight all matchable tiles
  const slotCounts = {};
  slots.forEach(s => slotCounts[s.type] = (slotCounts[s.type]||0)+1);
  
  tiles.forEach(t => {
    if(!isCovered(t) && (slotCounts[t.type]||0) >= 2){
      t.el.style.boxShadow = '0 0 16px rgba(255,193,7,.8)';
      t.el.style.borderColor = '#ffc107';
      setTimeout(() => {
        t.el.style.boxShadow = '2px 2px 8px rgba(0,0,0,.15)';
        t.el.style.borderColor = '#e0e0e0';
      }, 1500);
    }
  });
  renderSlots();
  toast('高亮可匹配牌 👁️');
}

// ═══════ Effects ═══════
function spawnParticles(type){
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=type;
    p.style.left='50%';
    p.style.top='70%';
    p.style.setProperty('--dx',(Math.random()-.5)*200+'px');
    p.style.setProperty('--dy',-(Math.random()*150+50)+'px');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),600);
  }
}

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

function showOverlay(icon, title, msg, isWin){
  const overlay=document.createElement('div');
  overlay.className='overlay';
  const nextBtn = isWin ? `<button class="btn btn-green" onclick="this.closest('.overlay').remove();nextLevel()">▶️ 进入第 ${level} 关</button>` : '';
  overlay.innerHTML=`<div class="modal">
    <div class="m-icon">${icon}</div>
    <h2>${title}</h2>
    <p>${msg.replace(/\\n/g,'<br>')}</p>
    ${nextBtn}
    <button class="btn btn-outline" style="margin-top:8px;width:100%" onclick="this.closest('.overlay').remove();restart()">🔄 重玩本关</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});
}

function nextLevel(){
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
  startLevel();
}

function startLevel(){
  slots=[];
  streak=0;
  totalCleared=0;
  undoStack=[];
  tools={shuffle:3, undo:3, peek:3};
  document.getElementById('streak').textContent='0';
  const cfg = LEVELS[Math.min(level-1, LEVELS.length-1)];
  document.getElementById('levelName').textContent = cfg.name+' · 第'+level+'关';
  generateTiles();
  renderBoard();
  renderSlots();
}

function restart(){
  // Re-generate same level
  slots=[];
  streak=0;
  totalCleared=0;
  undoStack=[];
  tools={shuffle:3, undo:3, peek:3};
  document.getElementById('streak').textContent='0';
  generateTiles();
  renderBoard();
  renderSlots();
}

// ═══════ Adaptive Resize ═══════
function adaptSize(){
  const vw = window.innerWidth;
  const scale = Math.min(1, vw / 380);
  // Adjust tile size for small screens
  document.documentElement.style.setProperty('--tile-scale', scale);
  // We adapt via the board width which is already min(340px, 90vw)
}

window.addEventListener('resize', adaptSize);

// ═══════ Init ═══════
startLevel();
adaptSize();
</script>
</body>
</html>
