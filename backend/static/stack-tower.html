<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>叠叠乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0f172a;color:#fff;height:100%;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}

.sky{position:fixed;inset:0;background:linear-gradient(180deg,#0f172a 0%,#1e293b 40%,#334155 100%);z-index:0}

/* 顶栏 */
.hud{position:relative;z-index:2;display:flex;justify-content:center;align-items:center;padding:16px 20px 8px;flex-shrink:0}
.hud .user-corner{position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;z-index:3}
.hud .corner-guest{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;border:1px solid rgba(255,255,255,.08)}
.hud .corner-guest:active{background:rgba(255,255,255,.20)}
.hud .corner-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700}
.hud .corner-badge{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:#fbbf24;font-size:9px;color:#0f172a;display:flex;align-items:center;justify-content:center;font-weight:900}
.hud .score{font-size:28px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3);text-align:center}
.hud .combo{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:13px;color:#fbbf24;font-weight:700;opacity:0;transition:opacity .2s}
.hud .combo.show{opacity:1}

/* 游戏区 */
.game{position:relative;z-index:2;flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:60px;overflow:hidden}
canvas{display:block}

.hint{position:relative;z-index:2;text-align:center;padding:0 20px 16px;flex-shrink:0}
.hint-text{font-size:14px;color:#64748b;transition:all .2s}
.hint-text.flash{color:#fbbf24;animation:popIn .3s}

/* 结算浮层 */
.overlay{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s}
.overlay.show{opacity:1;pointer-events:auto}
.overlay-bg{position:absolute;inset:0;background:rgba(15,23,42,.85)}
.overlay-box{position:relative;background:linear-gradient(135deg,#1e293b,#334155);border-radius:24px;padding:28px 24px;text-align:center;max-width:340px;width:92%;box-shadow:0 16px 48px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);max-height:85vh;overflow-y:auto}
.overlay-box .icon{font-size:48px;margin-bottom:8px}
.overlay-box h2{font-size:14px;color:#94a3b8;font-weight:500;margin-bottom:4px}
.overlay-box .final{font-size:56px;font-weight:900;color:#fff;line-height:1;margin-bottom:4px}
.overlay-box .sub{font-size:13px;color:#64748b;margin-bottom:4px}
.overlay-box .rank-info{font-size:13px;color:#fbbf24;margin-bottom:16px}
.overlay-box .btn{display:block;width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;transition:all .2s}
.overlay-box .btn:active{transform:scale(.97)}
.overlay-box .btn-row{display:flex;gap:8px}
.overlay-box .btn-row .btn{flex:1}
.btn-retry{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;box-shadow:0 4px 16px rgba(245,158,11,.3)}
.btn-share{background:rgba(255,255,255,.08);color:#94a3b8;font-size:14px}
.btn-best{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0f172a;box-shadow:0 4px 20px rgba(251,191,36,.4);animation:glow 2s infinite}
.btn-login{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.3)}
.btn-board{background:rgba(255,255,255,.06);color:#94a3b8;font-size:13px;padding:12px}
@keyframes glow{0%,100%{box-shadow:0 4px 20px rgba(251,191,36,.4)}50%{box-shadow:0 4px 30px rgba(251,191,36,.7)}}

/* 登录弹窗 */
.login-modal{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.login-modal.show{opacity:1;pointer-events:auto}
.login-bg{position:absolute;inset:0;background:rgba(0,0,0,.7)}
.login-box{position:relative;background:linear-gradient(135deg,#1e293b,#334155);border-radius:20px;padding:24px;text-align:center;max-width:300px;width:90%;border:1px solid rgba(255,255,255,.1)}
.login-box h3{font-size:18px;margin-bottom:4px}
.login-box .login-sub{font-size:13px;color:#64748b;margin-bottom:16px}
.login-box input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:16px;text-align:center;font-family:inherit;outline:none;margin-bottom:12px}
.login-box input:focus{border-color:#6366f1}
.login-box .login-err{font-size:12px;color:#f43f5e;margin-bottom:8px;min-height:18px}
.login-box .login-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.login-box .login-btn:active{transform:scale(.97)}
.login-box .login-skip{font-size:13px;color:#64748b;margin-top:12px;cursor:pointer;background:none;border:none;font-family:inherit}

/* 排行榜 */
.board-list{text-align:left;margin-bottom:16px}
.board-header{display:flex;padding:8px 12px;font-size:12px;color:#64748b;border-bottom:1px solid rgba(255,255,255,.06);gap:8px}
.board-header span:nth-child(1){width:28px}
.board-header span:nth-child(2){flex:1}
.board-header span:nth-child(3){width:44px;text-align:right}
.board-row{display:flex;padding:10px 12px;font-size:14px;gap:8px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .2s}
.board-row.me{background:rgba(99,102,241,.15);border-radius:8px}
.board-row .rank{width:28px;color:#64748b;font-weight:700}
.board-row .rank.gold{color:#fbbf24}.board-row .rank.silver{color:#94a3b8}.board-row .rank.bronze{color:#f97316}
.board-row .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.board-row .pts{width:44px;text-align:right;color:#fbbf24;font-weight:700}
.board-tabs{display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,.04);border-radius:10px;padding:3px}
.board-tab{flex:1;padding:8px;border-radius:8px;border:none;background:none;color:#64748b;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.board-tab.active{background:rgba(99,102,241,.3);color:#fff}

/* 个人中心 - 排名曲线 */
.profile-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.stat-item{text-align:center}
.stat-val{font-size:24px;font-weight:900;color:#fbbf24}
.stat-label{font-size:11px;color:#64748b}
.chart-box{width:100%;height:120px;margin:16px 0;position:relative}
.chart-box canvas{width:100%;height:100%}
.trend-text{font-size:13px;color:#94a3b8;margin-top:4px}
.recent-list{text-align:left;max-height:200px;overflow-y:auto;margin-top:12px}
.recent-item{display:flex;justify-content:space-between;padding:8px 12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
.recent-item .r-score{color:#fbbf24;font-weight:700}
.recent-item .r-time{color:#64748b;font-size:12px}

.perfect-pop{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;color:#fbbf24;pointer-events:none;z-index:5;animation:perfectUp .8s cubic-bezier(.16,1,.3,1) forwards;text-shadow:0 2px 16px rgba(251,191,36,.5)}
@keyframes perfectUp{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}60%{opacity:1;transform:translate(-50%,-65%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-85%) scale(1)}}

.combo-pop{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:900;color:#f97316;pointer-events:none;z-index:5;animation:comboUp .6s cubic-bezier(.16,1,.3,1) forwards}
@keyframes comboUp{0%{opacity:1;transform:translate(-50%,0) scale(.8)}100%{opacity:0;transform:translate(-50%,-40px) scale(1.2)}}

@keyframes popIn{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
/* 返回导航 — 可拖拽 */
.back-nav{position:fixed;top:12px;left:12px;z-index:50;
  display:flex;align-items:center;gap:6px;touch-action:none;cursor:grab;user-select:none;
  background:linear-gradient(135deg,rgba(99,102,241,.20),rgba(6,182,212,.14));
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:22px;padding:4px 6px;
  border:1px solid rgba(0,0,0,.06);
  box-shadow:0 2px 16px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.04);
  transition:box-shadow .2s,opacity .3s}
.back-nav:active{cursor:grabbing;box-shadow:0 4px 24px rgba(99,102,241,.15),inset 0 1px 0 rgba(255,255,255,.04)}
.back-nav.hide{opacity:0;pointer-events:none}
.back-nav .bn-link{color:#fff;font-size:12px;text-decoration:none;display:flex;align-items:center;gap:4px;font-weight:600;white-space:nowrap;letter-spacing:.3px}
.back-nav .bn-divider{width:1px;height:14px;background:rgba(255,255,255,.20);border-radius:1px}
.back-nav .bn-close{width:22px;height:22px;border-radius:50%;border:none;
background:rgba(255,255,255,.10);color:#fff;font-size:12px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.back-nav .bn-close:hover{background:rgba(255,255,255,.20);color:#fff}
</style>
</head>
<body>
<div class="back-nav" id="backNav">
  <a href="/nav" class="bn-link">🏠 导航</a>
  <span class="bn-divider"></span>
  <button class="bn-close" id="bnClose">×</button>
</div>

<div class="sky"></div>

<div class="hud">
  <div class="score" id="score">0</div>
  <div class="combo" id="combo">COMBO ×1</div>
  <div class="user-corner" id="userCorner" title="登录">
    <span class="corner-guest" id="cornerGuest">👤</span>
  </div>
</div>

<div class="game" id="gameContainer">
  <canvas id="c"></canvas>
</div>

<div class="hint">
  <div class="hint-text" id="hint">👆 点击放置砖块</div>
</div>

<!-- 游戏结束 -->
<div class="overlay" id="overlay">
  <div class="overlay-bg" id="overlayBg"></div>
  <div class="overlay-box" id="overlayBox">
    <div class="icon" id="ovIcon">😤</div>
    <h2 id="ovTitle">叠了</h2>
    <div class="final" id="ovScore">0</div>
    <div class="sub" id="ovSub">层</div>
    <div class="rank-info" id="ovRank"></div>
    <div id="ovBtns">
      <button class="btn btn-retry" id="btnRetry">🔄 再来一次</button>
      <button class="btn btn-share" id="btnShare">📤 分享成绩</button>
    </div>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="login-modal" id="loginModal">
  <div class="login-bg" id="loginBg"></div>
  <div class="login-box">
    <h3 id="loginTitle">登录</h3>
    <div class="login-sub" id="loginSub">手机号+密码登录，同步排行榜</div>
    <input type="tel" id="loginPhone" placeholder="手机号" maxlength="11" autocomplete="tel">
    <input type="password" id="loginPwd" placeholder="密码（6位以上）" maxlength="20" autocomplete="current-password">
    <input type="text" id="loginNick" placeholder="昵称（2-8字符）" maxlength="8" autocomplete="off" style="display:none">
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn">登录</button>
    <button class="login-skip" id="loginToggle">没有账号？去注册</button>
    <button class="login-skip" id="loginSkip">先玩再说</button>
  </div>
</div>

<!-- 排行榜弹窗 -->
<div class="overlay" id="boardOverlay">
  <div class="overlay-bg" id="boardBg"></div>
  <div class="overlay-box">
    <h2>🏆 排行榜</h2>
    <div class="board-tabs">
      <button class="board-tab active" data-period="all">总榜</button>
      <button class="board-tab" data-period="today">今日</button>
    </div>
    <div class="board-list" id="boardList">加载中...</div>
    <button class="btn btn-share" id="btnCloseBoard">关闭</button>
  </div>
</div>

<!-- 个人中心弹窗 -->
<div class="overlay" id="profileOverlay">
  <div class="overlay-bg" id="profileBg"></div>
  <div class="overlay-box">
    <div class="icon">👤</div>
    <h2 id="profileName"></h2>
    <div class="profile-stats">
      <div class="stat-item"><div class="stat-val" id="profBest">0</div><div class="stat-label">最高分</div></div>
      <div class="stat-item"><div class="stat-val" id="profTotal">0</div><div class="stat-label">总局数</div></div>
      <div class="stat-item"><div class="stat-val" id="profAvg">0</div><div class="stat-label">均分</div></div>
    </div>
    <div class="board-tabs">
      <button class="board-tab active" data-tab="chart">📈 排名曲线</button>
      <button class="board-tab" data-tab="recent">📋 最近记录</button>
    </div>
    <div id="profChartArea">
      <div class="chart-box"><canvas id="chartCanvas"></canvas></div>
      <div class="trend-text" id="trendText"></div>
    </div>
    <div id="profRecentArea" style="display:none">
      <div class="recent-list" id="recentList"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-retry" id="btnBackToGame" style="flex:1">返回游戏</button>
      <button class="btn btn-share" id="btnLogout" style="flex:1">退出登录</button>
    </div>
  </div>
</div>

<script>
// ═══════ 返回导航拖拽 ═══════
(function(){
  const nav=document.getElementById('backNav');
  const close=document.getElementById('bnClose');
  let dragging=false,ox=0,oy=0,nx=0,ny=0;
  close.addEventListener('click',e=>{e.stopPropagation();nav.classList.add('hide')});
  nav.addEventListener('pointerdown',e=>{
    if(e.target===close)return;
    dragging=true;nav.style.transition='none';
    const r=nav.getBoundingClientRect();
    ox=e.clientX-r.left;oy=e.clientY-r.top;
    nav.setPointerCapture(e.pointerId);
  });
  nav.addEventListener('pointermove',e=>{
    if(!dragging)return;
    nx=e.clientX-ox;ny=e.clientY-oy;
    nav.style.left=nx+'px';nav.style.top=ny+'px';nav.style.transform='none';
  });
  nav.addEventListener('pointerup',()=>{
    dragging=false;nav.style.transition='box-shadow .2s,opacity .3s';
  });
})();

// ═══════ 游戏参数 ═══════
const W=375, H=600, BLOCK_H=32, INIT_W=160, MIN_W=8, BASE_SPEED=1.8, SPEED_INC=0.06, PERFECT_THRESH=4;
const COLORS=['#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899','#f43f5e','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#14b8a6','#06b6d4','#0ea5e9','#3b82f6'];

let canvas, ctx, container;
let stack=[], currentBlock, gameActive=false, animFrame;
let score=0, comboCounter=0, bestScore=0;
let blockX, blockW, blockDir, blockSpeed, screenOffsetY=0, targetOffsetY=0;
let fallingBlocks=[], particles=[], shakeAmount=0;

// ═══════ 用户状态 ═══════
const API = '/api/game';
let userState = { loggedIn: false, token: '', nickname: '', userId: null, bestScore: 0, totalGames: 0 };

function loadUser(){
  const s = localStorage.getItem('stackTowerUser');
  if(s) userState = JSON.parse(s);
}
function saveUser(){
  localStorage.setItem('stackTowerUser', JSON.stringify(userState));
}
function updateHUD(){
  // 右上角登录入口
  const corner = document.getElementById('userCorner');
  if(userState.loggedIn){
    const initial = userState.nickname.charAt(0);
    corner.innerHTML = `<div class="corner-avatar" id="btnProfile" title="${userState.nickname}">${initial}</div><span class="corner-badge">🏆</span>`;
    document.getElementById('btnProfile').addEventListener('click', showProfile);
  } else {
    corner.innerHTML = '<span class="corner-guest" id="cornerGuest" title="登录/注册">👤</span>';
    document.getElementById('cornerGuest').addEventListener('click', showLogin);
  }
  bestScore = userState.bestScore || parseInt(localStorage.getItem('stackTowerBest')||'0');
}

function authHeaders(){
  return userState.token ? { 'Authorization': 'Bearer '+userState.token, 'Content-Type':'application/json' } : { 'Content-Type':'application/json' };
}

async function apiRegister(phone, password, nickname){
  const r = await fetch(API+'/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({phone, password, nickname})
  });
  if(!r.ok){ const e=await r.json(); throw new Error(e.detail); }
  return r.json();
}

async function apiLogin(phone, password){
  const r = await fetch(API+'/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({phone, password})
  });
  if(!r.ok){ const e=await r.json(); throw new Error(e.detail); }
  return r.json();
}

async function apiSaveScore(sc){
  const r = await fetch(API+'/score', {
    method:'POST', headers: authHeaders(),
    body: JSON.stringify({score: sc})
  });
  if(!r.ok) return null;
  return r.json();
}

async function apiLeaderboard(period='all'){
  const r = await fetch(`${API}/leaderboard?period=${period}&limit=30`);
  return r.json();
}

async function apiMyScores(){
  const r = await fetch(`${API}/my-scores?limit=20`, { headers: authHeaders() });
  return r.json();
}

async function apiRankHistory(){
  const r = await fetch(`${API}/rank-history?limit=30`, { headers: authHeaders() });
  return r.json();
}

// ═══════ 登录/注册 ═══════
let loginMode = 'login'; // 'login' | 'register'

function showLogin(){
  const modal = document.getElementById('loginModal');
  const nickEl = document.getElementById('loginNick');
  const titleEl = document.getElementById('loginTitle');
  const subEl = document.getElementById('loginSub');
  const btnEl = document.getElementById('loginBtn');
  const toggleEl = document.getElementById('loginToggle');

  modal.classList.add('show');
  document.getElementById('loginErr').textContent = '';

  if(loginMode === 'register'){
    titleEl.textContent = '注册';
    subEl.textContent = '手机号+密码注册，同步排行榜';
    nickEl.style.display = '';
    btnEl.textContent = '注册';
    toggleEl.textContent = '已有账号？去登录';
    document.getElementById('loginPhone').value = '';
    document.getElementById('loginPwd').value = '';
    nickEl.value = '';
  } else {
    titleEl.textContent = '登录';
    subEl.textContent = '手机号+密码登录，同步排行榜';
    nickEl.style.display = 'none';
    btnEl.textContent = '登录';
    toggleEl.textContent = '没有账号？去注册';
    document.getElementById('loginPhone').value = '';
    document.getElementById('loginPwd').value = '';
  }

  document.getElementById('loginPhone').focus();
}

function hideLogin(){
  document.getElementById('loginModal').classList.remove('show');
}

document.getElementById('loginToggle').addEventListener('click', ()=>{
  loginMode = loginMode==='login'?'register':'login';
  showLogin();
});

async function doLogin(){
  const phone = document.getElementById('loginPhone').value.trim();
  const password = document.getElementById('loginPwd').value.trim();
  const errEl = document.getElementById('loginErr');

  if(!/^1[0-9]{10}$/.test(phone)){ errEl.textContent = '请输入11位手机号'; return; }
  if(password.length < 6){ errEl.textContent = '密码至少6位'; return; }

  try{
    let data;
    if(loginMode === 'register'){
      const nickname = document.getElementById('loginNick').value.trim();
      if(nickname.length < 2 || nickname.length > 8){ errEl.textContent = '昵称需2-8个字符'; return; }
      data = await apiRegister(phone, password, nickname);
    } else {
      data = await apiLogin(phone, password);
    }

    // 先关弹窗再更新HUD，确保不会因HUD报错卡住
    hideLogin();
    try{
      userState = {
        loggedIn: true,
        token: data.token || '',
        nickname: data.nickname || '',
        userId: data.user_id || 0,
        bestScore: data.best_score || 0,
        totalGames: data.total_games || 0,
      };
      saveUser();
      updateHUD();
    }catch(e){ console.error('updateHUD error:', e); }
  } catch(e){
    errEl.textContent = e.message || '操作失败，重试';
  }
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPhone').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPwd').focus(); });
document.getElementById('loginPwd').addEventListener('keydown', e => { if(e.key==='Enter'){ if(loginMode==='register') document.getElementById('loginNick').focus(); else doLogin(); }});
document.getElementById('loginNick').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('loginSkip').addEventListener('click', hideLogin);
document.getElementById('loginBg').addEventListener('click', hideLogin);

// ═══════ 排行榜 ═══════
let boardPeriod = 'all';

async function showLeaderboard(){
  document.getElementById('boardOverlay').classList.add('show');
  document.getElementById('boardList').innerHTML = '<div style="text-align:center;color:#64748b;padding:20px">加载中...</div>';
  const data = await apiLeaderboard(boardPeriod);
  renderBoard(data);
}

function renderBoard(data){
  const list = document.getElementById('boardList');
  if(!data.length){ list.innerHTML = '<div style="text-align:center;color:#64748b;padding:20px">暂无数据，快来玩！</div>'; return; }

  let html = '<div class="board-header"><span>#</span><span>玩家</span><span>最高</span></div>';
  data.forEach(r => {
    const rankCls = r.rank===1?'gold':r.rank===2?'silver':r.rank===3?'bronze':'';
    const meCls = userState.loggedIn && r.nickname===userState.nickname ? ' me' : '';
    html += `<div class="board-row${meCls}"><span class="rank ${rankCls}">${r.rank}</span><span class="name">${r.nickname}</span><span class="pts">${r.best_score}</span></div>`;
  });

  if(userState.loggedIn){
    const myRank = data.find(r=>r.nickname===userState.nickname);
    if(!myRank){
      html += `<div style="text-align:center;color:#64748b;padding:8px;font-size:12px">你的最高 ${userState.bestScore} 层 — 继续加油！</div>`;
    }
  }

  list.innerHTML = html;
}

function hideLeaderboard(){
  document.getElementById('boardOverlay').classList.remove('show');
}

document.getElementById('boardBg').addEventListener('click', hideLeaderboard);
document.getElementById('btnCloseBoard').addEventListener('click', hideLeaderboard);

document.querySelectorAll('.board-tab[data-period]').forEach(tab => {
  tab.addEventListener('click', async function(){
    document.querySelectorAll('.board-tab[data-period]').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');

    document.getElementById('boardList').innerHTML = '<div style="text-align:center;color:#64748b;padding:20px">加载中...</div>';

});

// ═══════ 个人中心 ═══════
let profileTab = 'chart';

async function showProfile(){
  document.getElementById('profileOverlay').classList.add('show');
  document.getElementById('profileName').textContent = userState.nickname;

  const [scoresData, rankData] = await Promise.all([
    apiMyScores(),
    apiRankHistory()
  ]);

  document.getElementById('profBest').textContent = scoresData.stats.best;
  document.getElementById('profTotal').textContent = scoresData.stats.total;
  document.getElementById('profAvg').textContent = scoresData.stats.avg;

  // 排名曲线
  drawRankChart(rankData.history);
  document.getElementById('trendText').textContent = rankData.trend;

  // 最近记录
  let recentHtml = '';
  scoresData.scores.forEach(s => {
    recentHtml += `<div class="recent-item"><span>${s.played_at}</span><span class="r-score">${s.score} 层</span></div>`;
  });
  document.getElementById('recentList').innerHTML = recentHtml || '<div style="text-align:center;color:#64748b;padding:12px">暂无记录</div>';

  // Tab 切换
  document.getElementById('profChartArea').style.display = profileTab==='chart'?'block':'none';
  document.getElementById('profRecentArea').style.display = profileTab==='chart'?'none':'block';
}

function drawRankChart(history){
  const c = document.getElementById('chartCanvas');
  const parent = c.parentElement;
  c.width = parent.clientWidth;
  c.height = parent.clientHeight;
  const ctx2 = c.getContext('2d');
  const w = c.width, h = c.height;
  const pad = {t:10, r:10, b:25, l:30};
  const pw = w-pad.l-pad.r, ph = h-pad.t-pad.b;

  ctx2.clearRect(0,0,w,h);

  if(history.length < 2){
    ctx2.fillStyle = '#64748b';
    ctx2.font = '12px sans-serif';
    ctx2.textAlign = 'center';
    ctx2.fillText('还差几局就能看到排名变化~', w/2, h/2);
    return;
  }

  const ranks = history.map(r=>r.rank);
  const minRank = Math.min(...ranks), maxRank = Math.max(...ranks);
  const range = maxRank-minRank || 1;

  // 网格
  ctx2.strokeStyle = 'rgba(255,255,255,.04)';
  ctx2.lineWidth = 0.5;
  for(let i=0;i<=4;i++){
    const y = pad.t + ph*i/4;
    ctx2.beginPath(); ctx2.moveTo(pad.l,y); ctx2.lineTo(w-pad.r,y); ctx2.stroke();
    ctx2.fillStyle = '#64748b';
    ctx2.font = '9px sans-serif';
    ctx2.textAlign = 'right';
    ctx2.fillText(Math.round(minRank+range*(4-i)/4), pad.l-4, y+3);
  }

  // 曲线
  ctx2.strokeStyle = '#fbbf24';
  ctx2.lineWidth = 2;
  ctx2.beginPath();
  history.forEach((r,i) => {
    const x = pad.l + pw*i/(history.length-1);
    const y = pad.t + ph*(1-(r.rank-minRank)/range);
    if(i===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
  });
  ctx2.stroke();

  // 点
  history.forEach((r,i) => {
    const x = pad.l + pw*i/(history.length-1);
    const y = pad.t + ph*(1-(r.rank-minRank)/range);
    ctx2.fillStyle = '#fbbf24';
    ctx2.beginPath(); ctx2.arc(x,y,3,0,Math.PI*2); ctx2.fill();
  });

  // x轴标签
  if(history.length>1){
    ctx2.fillStyle = '#64748b';
    ctx2.font = '9px sans-serif';
    ctx2.textAlign = 'left';
    ctx2.fillText(history[0].played_at, pad.l, h-5);
    ctx2.textAlign = 'right';
    ctx2.fillText(history[history.length-1].played_at, w-pad.r, h-5);
  }
}

function hideProfile(){
  document.getElementById('profileOverlay').classList.remove('show');
}

document.getElementById('profileBg').addEventListener('click', hideProfile);

// ═══════ 初始化 ═══════
function init(){
  canvas=document.getElementById('c');
  ctx=canvas.getContext('2d');
  container=document.getElementById('gameContainer');
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);

  loadUser();
  updateHUD();

  document.getElementById('btnRetry').addEventListener('click',startGame);
  document.getElementById('btnShare').addEventListener('click',shareScore);
  canvas.addEventListener('pointerdown',handleTap);

  startGame();
}

function resizeCanvas(){
  const w=container.clientWidth;
  const h=container.clientHeight;
  const scale=Math.min(w/W,h/H);
  canvas.width=W*scale;
  canvas.height=H*scale;
  canvas.style.width=W*scale+'px';
  canvas.style.height=H*scale+'px';
  ctx.setTransform(scale,0,0,scale,0,0);
}

// ═══════ 游戏逻辑 ═══════
function startGame(){
  score=0;comboCounter=0;screenOffsetY=0;targetOffsetY=0;
  fallingBlocks=[];particles=[];shakeAmount=0;
  stack=[{x:W/2-INIT_W/2,w:INIT_W,y:H-BLOCK_H,color:COLORS[0]}];
  document.getElementById('score').textContent='0';
  document.getElementById('combo').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('hint').textContent='👆 点击放置砖块';
  document.getElementById('hint').className='hint-text';
  gameActive=true;
  spawnBlock();
  cancelAnimationFrame(animFrame);
  loop();
}

function spawnBlock(){
  const prev=stack[stack.length-1];
  const w=prev.w;
  blockW=w;
  blockDir=Math.random()>.5?1:-1;
  blockX=blockDir===1?0:W-w;
  blockSpeed=BASE_SPEED+stack.length*SPEED_INC;
  currentBlock={x:blockX,w:blockW,color:COLORS[stack.length%COLORS.length]};
}

function handleTap(e){
  if(!gameActive)return;
  e.preventDefault();
  placeBlock();
}

function placeBlock(){
  const prev=stack[stack.length-1];
  const cx=currentBlock.x;

  const overlapStart=Math.max(cx,prev.x);
  const overlapEnd=Math.min(cx+currentBlock.w,prev.x+prev.w);
  const overlapW=overlapEnd-overlapStart;

  if(overlapW<=0){ gameOver(); return; }

  const centerDiff=Math.abs((cx+currentBlock.w/2)-(prev.x+prev.w/2));
  const isPerfect=centerDiff<=PERFECT_THRESH;

  const newBlock={x:overlapStart,w:Math.max(overlapW,MIN_W),color:currentBlock.color};

  const baseY=prev.y-BLOCK_H;
  if(cx<prev.x) fallingBlocks.push({x:cx,w:prev.x-cx,y:baseY,vy:0,color:currentBlock.color,life:60});
  if(cx+currentBlock.w>prev.x+prev.w) fallingBlocks.push({x:prev.x+prev.w,w:cx+currentBlock.w-(prev.x+prev.w),y:baseY,vy:0,color:currentBlock.color,life:60});

  const pcx=overlapStart+overlapW/2;
  const count=isPerfect?14:6;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*(isPerfect?4:2);
    particles.push({
      x:pcx,y:baseY+BLOCK_H/2,
      vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,
      life:25+Math.random()*15,color:newBlock.color,
      size:isPerfect?1.5+Math.random()*2.5:1+Math.random()*1.5
    });
  }

  if(!isPerfect) shakeAmount=Math.max(shakeAmount,centerDiff<15?2:4);

  newBlock.y=baseY;
  stack.push(newBlock);

  if(isPerfect){ comboCounter++; score+=3*comboCounter; spawnPerfectPop(); if(comboCounter>=3)spawnComboPop(comboCounter); flashHint('PERFECT!'); }
  else { comboCounter=0; score+=1; flashHint(centerDiff<20?'不错！':''); }

  document.getElementById('score').textContent=score;
  if(comboCounter>=2){ const ce=document.getElementById('combo'); ce.textContent='COMBO ×'+comboCounter; ce.classList.add('show'); }
  else document.getElementById('combo').classList.remove('show');

  targetOffsetY = Math.max(0, H*0.35-newBlock.y);
  spawnBlock();
}

async function gameOver(){
  gameActive=false;

  const isNewBest = score > bestScore;
  if(isNewBest){
    bestScore = score;
    localStorage.setItem('stackTowerBest', bestScore);
    if(userState.loggedIn) userState.bestScore = bestScore;
  }

  document.getElementById('ovIcon').textContent=isNewBest?'👑':score>30?'🎉':score>15?'👍':'😤';
  document.getElementById('ovTitle').textContent=isNewBest?'新纪录！':'叠了';
  document.getElementById('ovScore').textContent=score;
  document.getElementById('ovSub').textContent='层';

  const btnsDiv = document.getElementById('ovBtns');

  if(!userState.loggedIn){
    // 游客模式
    document.getElementById('ovRank').textContent = '';
    btnsDiv.innerHTML = `
      <button class="btn btn-login" id="ovLoginBtn">🔑 登录保存成绩</button>
      <div class="btn-row">
        <button class="btn btn-retry" id="btnRetry2">🔄 再来</button>
        <button class="btn btn-board" id="ovBoardBtn">🏆 排行榜</button>
      </div>
    `;
    document.getElementById('ovLoginBtn').addEventListener('click', ()=>{ showLogin(); });
    document.getElementById('btnRetry2').addEventListener('click', startGame);
    document.getElementById('ovBoardBtn').addEventListener('click', showLeaderboard);
  } else {
    // 用户模式：自动上传成绩
    const result = await apiSaveScore(score);
    if(result){
      if(result.best_score > userState.bestScore){
        userState.bestScore = result.best_score;
        saveUser();
        updateHUD();
      }
      userState.totalGames = result.total_games;
      saveUser();

      const rankStr = result.rank <= 3
        ? `🏆 第 ${result.rank} 名！`
        : `排名第 ${result.rank}`;
      document.getElementById('ovRank').textContent = `${rankStr} · 共 ${result.total_games} 局 · 均分 ${result.avg_score}`;
    }

    btnsDiv.innerHTML = `
      <button class="btn ${isNewBest?'btn-best':'btn-retry'}" id="btnRetry2">${isNewBest?'👑 新纪录！再来':'🔄 再来一次'}</button>
      <div class="btn-row">
        <button class="btn btn-board" id="ovBoardBtn">🏆 排行榜</button>
        <button class="btn btn-share" id="btnShare2">📤 分享</button>
      </div>
    `;
    document.getElementById('btnRetry2').addEventListener('click', startGame);
    document.getElementById('ovBoardBtn').addEventListener('click', showLeaderboard);
    document.getElementById('btnShare2').addEventListener('click', shareScore);
  }

  document.getElementById('overlay').classList.add('show');
  document.getElementById('hint').textContent='';

  if(isNewBest && userState.loggedIn) updateHUD();
}

function update(dt){
  if(!gameActive)return;
  currentBlock.x+=blockSpeed*blockDir*dt;
  if(currentBlock.x<=0){currentBlock.x=0;blockDir=1}
  if(currentBlock.x+currentBlock.w>=W){currentBlock.x=W-currentBlock.w;blockDir=-1}

  for(let i=fallingBlocks.length-1;i>=0;i--){
    const fb=fallingBlocks[i]; fb.vy+=0.6*dt; fb.y+=fb.vy*dt; fb.life-=dt;
    if(fb.life<=0||fb.y>H+100)fallingBlocks.splice(i,1);
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.15*dt; p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
  if(shakeAmount>0){ shakeAmount*=Math.pow(0.05,dt/16.67); if(shakeAmount<0.1)shakeAmount=0; }
  screenOffsetY+=(targetOffsetY-screenOffsetY)*0.08*dt;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  let sx=0,sy=0;
  if(shakeAmount>0.1){ sx=(Math.random()-.5)*shakeAmount*2; sy=(Math.random()-.5)*shakeAmount*2; ctx.save(); ctx.translate(sx,sy); }

  for(let i=stack.length-1;i>=0;i--){
    const b=stack[i];
    if(!isFinite(b.x)||!isFinite(b.y))continue;
    const y=b.y+screenOffsetY;
    if(!isFinite(y)||y>H+BLOCK_H||y<-BLOCK_H)continue;
    const grad=ctx.createLinearGradient(b.x,y,b.x,y+BLOCK_H);
    grad.addColorStop(0,lighten(b.color,.15)); grad.addColorStop(.5,b.color); grad.addColorStop(1,darken(b.color,.1));
    ctx.fillStyle=grad; roundRect(b.x,y,b.w,BLOCK_H,4); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.12)'; roundRect(b.x+2,y,Math.max(0,b.w-4),2,2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.15)'; roundRect(b.x+2,y+BLOCK_H-3,Math.max(0,b.w-4),3,2); ctx.fill();
  }

  for(const fb of fallingBlocks){
    const y=fb.y+screenOffsetY; if(y>H+BLOCK_H||y<-BLOCK_H)continue;
    ctx.globalAlpha=Math.min(1,fb.life/20); ctx.fillStyle=fb.color; roundRect(fb.x,y,fb.w,BLOCK_H,3); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.08)'; roundRect(fb.x+1,y,Math.max(0,fb.w-2),2,1); ctx.fill();
    ctx.globalAlpha=1;
  }

  for(const p of particles){
    const y=p.y+screenOffsetY; if(y>H||y<0)continue;
    ctx.globalAlpha=p.life/40; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,y,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  if(gameActive&&currentBlock&&isFinite(currentBlock.x)&&isFinite(currentBlock.w)&&currentBlock.x!==null){
    const y=stack[stack.length-1].y-BLOCK_H+screenOffsetY;
    if(isFinite(y)){
    const grad=ctx.createLinearGradient(currentBlock.x,y,currentBlock.x,y+BLOCK_H);
    grad.addColorStop(0,lighten(currentBlock.color,.2)); grad.addColorStop(.5,currentBlock.color); grad.addColorStop(1,darken(currentBlock.color,.1));
    ctx.fillStyle=grad; ctx.globalAlpha=.9; roundRect(currentBlock.x,y,currentBlock.w,BLOCK_H,4); ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1.5; roundRect(currentBlock.x,y,currentBlock.w,BLOCK_H,4); ctx.stroke();
  }}

  if(shakeAmount>0.1)ctx.restore();

  const topBlock=stack[stack.length-1];
  const topY=topBlock.y+screenOffsetY;
  if(topY<0){ ctx.fillStyle='rgba(255,255,255,.5)'; ctx.font='11px -apple-system,sans-serif'; ctx.textAlign='center'; ctx.fillText('▲ 上面还有 '+Math.floor(-topY/BLOCK_H)+' 层',W/2,40); }
}

function loop(ts){
  if(!gameActive&&!document.getElementById('overlay').classList.contains('show'))return;
  if(loop.lastTs===undefined)loop.lastTs=ts||performance.now();
  const dt=Math.min((ts||performance.now())-loop.lastTs,50)/16.67;
  loop.lastTs=ts||performance.now();
  update(dt); draw();
  animFrame=requestAnimationFrame(loop);
}
loop.lastTs=0;

function spawnPerfectPop(){
  const el=document.createElement('div'); el.className='perfect-pop'; el.textContent='PERFECT!';
  document.body.appendChild(el); el.addEventListener('animationend',()=>el.remove());
}
function spawnComboPop(n){
  const el=document.createElement('div'); el.className='combo-pop'; el.textContent='COMBO ×'+n;
  document.body.appendChild(el); el.addEventListener('animationend',()=>el.remove());
}
function flashHint(text){
  const el=document.getElementById('hint');
  if(text){ el.textContent=text; el.className='hint-text flash'; setTimeout(()=>{el.className='hint-text';el.textContent='👆 点击放置砖块'},600); }
}

function shareScore(){
  const text='🧱 叠叠乐\n🏆 '+score+' 层\n\n来挑战我？ct256.cn/stack-tower';
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(()=>{
    document.getElementById('btnShare').textContent='✅ 已复制！';
    setTimeout(()=>{ try{document.getElementById('btnShare').textContent='📤 分享成绩'}catch(e){} },2000);
  });}
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function lighten(hex,amt){
  const num=parseInt(hex.slice(1),16);
  const r=Math.min(255,(num>>16)+255*amt);
  const g=Math.min(255,((num>>8)&0xFF)+255*amt);
  const b=Math.min(255,(num&0xFF)+255*amt);
  return `rgb(${r|0},${g|0},${b|0})`;
}

function darken(hex,amt){
  const num=parseInt(hex.slice(1),16);
  const r=Math.max(0,(num>>16)-255*amt);
  const g=Math.max(0,((num>>8)&0xFF)-255*amt);
  const b=Math.max(0,(num&0xFF)-255*amt);
  return `rgb(${r|0},${g|0},${b|0})`;
}
