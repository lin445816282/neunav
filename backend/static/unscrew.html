@keyframes comboFlash {

<script>
// ═══════ 导航拖拽 ═══════
(function(){
var n=document.getElementById('backNav'),c=document.getElementById('bnClose'),d=!1,ox=0,oy=0;
c.onclick=function(e){e.stopPropagation();n.style.display='none'};
n.addEventListener('pointerdown',function(e){if(e.target===c)return;d=!0;n.classList.add('dragging');var r=n.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;n.setPointerCapture(e.pointerId)});
n.addEventListener('pointermove',function(e){if(!d)return;n.style.left=(e.clientX-ox)+'px';n.style.top=(e.clientY-oy)+'px';n.style.transform='none'});
n.addEventListener('pointerup',function(){d=!1;n.classList.remove('dragging')});
})();

// ═══════ 防缩放 ═══════
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());

// ═══════ 音效 ═══════
let soundOn=!0;
try{var audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){audioCtx=null}
var masterGain=audioCtx?audioCtx.createGain():null;
if(masterGain){masterGain.connect(audioCtx.destination);var savedVol=parseFloat(localStorage.getItem('sfx_volume'));masterGain.gain.value=isNaN(savedVol)?0.7:savedVol}
let soundTheme=localStorage.getItem('sfx_theme')||'classic';
// p=音高倍率(>1尖锐<1低沉), w=波形映射{sine:?,triangle:?,sawtooth:?}
const SFX_T={
  classic:{p:1,  w:{sine:'sine',triangle:'triangle',sawtooth:'sawtooth'}},       // 标准
  cute:   {p:1.55,w:{sine:'sine',triangle:'triangle',sawtooth:'sawtooth'}},       // 可爱
  chip:   {p:2.0, w:{sine:'sawtooth',triangle:'sawtooth',sawtooth:'sawtooth'}},   // 8-bit
  warm:   {p:.7,  w:{sine:'sine',triangle:'triangle',sawtooth:'sine'}},           // 温暖
  dream:  {p:2.2, w:{sine:'triangle',triangle:'triangle',sawtooth:'triangle'}},   // 梦幻
  tiny:   {p:3.5, w:{sine:'sine',triangle:'sine',sawtooth:'sine'}},               // 八音盒
  sparkle:{p:1.8, w:{sine:'sine',triangle:'sine',sawtooth:'triangle'}},           // 闪亮
  jazz:   {p:.9,  w:{sine:'sine',triangle:'triangle',sawtooth:'triangle'}}        // 爵士
};
const SFX_LABELS={classic:'标准',cute:'可爱',chip:'8-bit',warm:'温暖',dream:'梦幻',tiny:'八音盒',sparkle:'闪亮',jazz:'爵士'};
if(localStorage.getItem('sfx_theme')&&SFX_T[localStorage.getItem('sfx_theme')])soundTheme=localStorage.getItem('sfx_theme');
function tw(t){var o=SFX_T[soundTheme];return{type:o.w[t]||t,p:o.p}}
function playTone(f,d,t,v){if(!soundOn||!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(masterGain||audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sfxClick(){if(!soundOn||!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();var tp=tw('sine'),t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=tp.type;o.frequency.setValueAtTime(800*tp.p,t);o.frequency.exponentialRampToValueAtTime(1200*tp.p,t+.06);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.connect(g);g.connect(masterGain||audioCtx.destination);o.start(t);o.stop(t+.08)}
function sfxCollect(){if(!soundOn||!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();var tp=tw('triangle'),t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=tp.type;o.frequency.setValueAtTime(500*tp.p,t);o.frequency.exponentialRampToValueAtTime(260*tp.p,t+.15);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.connect(g);g.connect(masterGain||audioCtx.destination);o.start(t);o.stop(t+.18)}
function sfxMatch(){if(!soundOn||!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();var tp=tw('sine'),t=audioCtx.currentTime;[523,659,784].forEach(function(f,i){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=tp.type;o.frequency.value=f*tp.p;g.gain.setValueAtTime(.08,t+i*.07);g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.15);o.connect(g);g.connect(masterGain||audioCtx.destination);o.start(t+i*.07);o.stop(t+i*.07+.15)})}
function sfxWin(){if(!soundOn||!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();var tp=tw('triangle'),t=audioCtx.currentTime,notes=[523,659,784,1047];notes.forEach(function(f,i){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=tp.type;o.frequency.value=f*tp.p;g.gain.setValueAtTime(.1,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.3);o.connect(g);g.connect(masterGain||audioCtx.destination);o.start(t+i*.1);o.stop(t+i*.1+.3)})}
function sfxLose(){if(!soundOn||!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();var tp=tw('sawtooth'),t=audioCtx.currentTime;[300,250,200].forEach(function(f,i){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=tp.type;o.frequency.value=f*tp.p;g.gain.setValueAtTime(.04,t+i*.15);g.gain.exponentialRampToValueAtTime(.001,t+i*.15+.2);o.connect(g);g.connect(masterGain||audioCtx.destination);o.start(t+i*.15);o.stop(t+i*.15+.2)})}
function sfxBomb(){if(!soundOn||!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();var tp=tw('sawtooth'),t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=tp.type;o.frequency.setValueAtTime(200*tp.p,t);o.frequency.exponentialRampToValueAtTime(50*tp.p,t+.3);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.connect(g);g.connect(masterGain||audioCtx.destination);o.start(t);o.stop(t+.35)}
function sfxUndo(){if(!soundOn||!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();var tp=tw('sine'),t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=tp.type;o.frequency.setValueAtTime(200*tp.p,t);o.frequency.exponentialRampToValueAtTime(600*tp.p,t+.2);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);o.connect(g);g.connect(masterGain||audioCtx.destination);o.start(t);o.stop(t+.22)}
function sfxPeek(){if(!soundOn||!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();var tp=tw('sine'),t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=tp.type;o.frequency.setValueAtTime(400*tp.p,t);o.frequency.exponentialRampToValueAtTime(1600*tp.p,t+.25);g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.connect(g);g.connect(masterGain||audioCtx.destination);o.start(t);o.stop(t+.3)}
function sfxShop(){playTone(440,.08,'sine',.06);setTimeout(function(){playTone(660,.08,'sine',.06)},80)}
function sfxBuy(){playTone(523,.12,'sine',.08);setTimeout(function(){playTone(659,.12,'sine',.08);setTimeout(function(){playTone(784,.2,'sine',.1)},100)},100)}
function toggleSound(){soundOn=!soundOn;var b=document.getElementById('themeBtn');if(soundOn){b.textContent='🔊';b.classList.remove('muted');if(masterGain){var sv=parseFloat(localStorage.getItem('sfx_volume'));masterGain.gain.value=isNaN(sv)||sv===0?0.7:sv}}else{b.textContent='🔇';b.classList.add('muted');if(masterGain)masterGain.gain.value=0}if(soundOn&&audioCtx&&audioCtx.state==='suspended')audioCtx.resume()}
function selectTheme(name){soundTheme=name;localStorage.setItem('sfx_theme',name);document.getElementById('themePicker').classList.remove('show');sfxClick()}
function toggleThemePanel(){var p=document.getElementById('themePicker'),b=document.getElementById('soundBtn'),r=b.getBoundingClientRect();p.style.top=(r.bottom+4)+'px';p.style.right=(window.innerWidth-r.right)+'px';p.classList.toggle('show')}

// ═══════ 皮肤系统 ═══════
const SKINS=[
  {id:'default',name:'星空',icon:'🪐',preview:'radial-gradient(circle at 35% 35%, #6366f1, #312e81)'},
  {id:'metal',name:'金属',icon:'⚙️',preview:'linear-gradient(135deg, #e2e8f0 10%, #475569 100%)'},
  {id:'gem',name:'宝石',icon:'💎',preview:'radial-gradient(circle at 30% 30%, #e9d5ff, #7c3aed, #4c1d95)'},
  {id:'candy',name:'糖果',icon:'🍬',preview:'radial-gradient(circle at 35% 35%, #fef3c7, #ea580c)'},
  {id:'pixel',name:'像素',icon:'👾',preview:'#6366f1'},
  {id:'nature',name:'自然',icon:'🌿',preview:'radial-gradient(circle at 35% 35%, #d4c4a8, #5a4420)'},
];
function getSkin(){return localStorage.getItem('game_skin')||'default'}
function applySkin(id){
  document.body.classList.forEach(function(c){if(c.startsWith('skin-'))document.body.classList.remove(c)});
  if(id!=='default')document.body.classList.add('skin-'+id);
  localStorage.setItem('game_skin',id);
}
function showSkinPicker(){
  var cur=getSkin(),html='';
  SKINS.forEach(function(s){
    html+='<div class="skin-item'+(s.id===cur?' active':'')+'" onclick="applySkin(\''+s.id+'\');hideSkinPicker()"><div class="si-preview" style="background:'+s.preview+'"></div><div class="si-name">'+s.icon+' '+s.name+'</div></div>';
  });
  document.getElementById('skinGrid').innerHTML=html;
  document.getElementById('skinOverlay').classList.add('show');
}
function hideSkinPicker(){document.getElementById('skinOverlay').classList.remove('show')}

// ═══════ 游戏数据 ═══════
const COLORS=[{name:'白',hex:'#e8e8e0',light:'#ffffff',face:'bunny',pattern:'crosshatch'},{name:'紫',hex:'#af52de',light:'#d4a0f0',face:'shy',pattern:'diagonal'},{name:'红',hex:'#ff3b30',light:'#ff8a80',face:'happy',pattern:'dots'},{name:'蓝',hex:'#007aff',light:'#6cb6ff',face:'cool',pattern:'vstripes'},{name:'橙',hex:'#ff9500',light:'#ffc04d',face:'wow',pattern:'concentric'},{name:'绿',hex:'#34c759',light:'#84d89a',face:'silly',pattern:'checker'},{name:'黄',hex:'#ffcc00',light:'#ffe566',face:'chill',pattern:'hstripes'},{name:'粉',hex:'#ff6b35',light:'#ffb088',face:'fire',pattern:'waves'}];
const MAX_SLOTS=5,MATCH_COUNT=3;
let screws=[],slots=[],score=0,level=1,combo=0,history=[],processing=!1,lastClick=0;
let comboTimer=null,levelEntryScore=0,totalScrewCount=0,starMoves=0,isDailyChallenge=!1,gameMode=0;
const COMBO_TIMEOUT=1500;
let props={undo:5,bomb:3,peek:3,lightning:3,shuffle:3},coins=30,paused=!1;
const $=id=>document.getElementById(id);

// ═══════ 收集槽 ═══════
function buildSlots(){var r=$('slotsRow');r.innerHTML='';for(var i=0;i<MAX_SLOTS;i++){var d=document.createElement('div');d.className='slot';d.id='slot'+i;r.appendChild(d)}}
function updateSlotsUI(){for(var i=0;i<MAX_SLOTS;i++){var el=$('slot'+i),s=slots[i];if(s){el.classList.remove('match','clearing');el.classList.add('filled');el.style.borderColor=s.color.hex;el.className=el.className.replace(/face-\w+/g,'');el.classList.add('face-'+s.color.face);var inner=el.querySelector('.screw-inner');if(!inner){inner=document.createElement('div');inner.className='screw-inner';inner.style.width='100%';inner.style.height='100%';el.appendChild(inner)}inner.style.background='radial-gradient(circle at 35% 35%,'+s.color.light+','+s.color.hex+' 50%,'+shadeColor(s.color.hex,-30)+')';inner.className='screw-inner';if(s.color.pattern)inner.classList.add('pat-'+s.color.pattern)}else{el.classList.remove('filled','match','clearing');el.className=el.className.replace(/face-\w+/g,'');el.style.borderColor='';el.innerHTML=''}}$('slotsRow').classList.toggle('warning',slots.filter(Boolean).length>=MAX_SLOTS-1)}
function flashSlots(indices){indices.forEach(function(i){var el=$('slot'+i);if(el){el.classList.add('match');el.style.color=slots[i]?slots[i].color.hex:'#fff';setTimeout(function(){el.classList.remove('match')},150)}})}
function clearSlots(indices){indices.forEach(function(i){var el=$('slot'+i);if(el)el.classList.add('clearing')});setTimeout(function(){indices.sort(function(a,b){return b-a}).forEach(function(i){slots.splice(i,1)});slots=slots.filter(Boolean);updateSlotsUI();processing=!1},100)}

// ═══════ 螺丝交互 ═══════
function onScrewClick(e){if(paused)return;var id=parseInt(this.getAttribute('data-id')),s=screws.find(function(x){return x.id===id});if(!s||s.blocked||s.removed||s.removing)return;processClick(s)}
function processClick(screw){if(processing)return;sfxClick();
  history.push({screw:screw,slots:slots.map(function(s){return s?{id:s.id,color:s.color}:null}),score:score,combo:combo});
  screw.removing=!0;var el=board.querySelector('.screw[data-id="'+screw.id+'"]');if(el){el.classList.add('removing')}
  screw.removed=!0;screw.removing=!1;starMoves++;setTimeout(function(){el&&el.remove()},150);slots.push({id:screw.id,color:screw.color});updateBlocked(screw.id);checkMatches();sfxCollect();
  requestAnimationFrame(function(){updateSlotsUI();addHole(screw);if(screws.every(function(s){return s.removed})){setTimeout(winLevel,400)}else{updateRemain()};autoSave()})}

// ═══════ 粒子爆发 ═══════
function spawnParticles(cx,cy,hex){
  var board=$('board'),count=8;
  for(var i=0;i<count;i++){
    var p=document.createElement('div');
    p.className='match-particle';
    var angle=(i/count)*Math.PI*2,r=30+Math.random()*40;
    p.style.cssText='left:'+cx+'%;top:'+cy+'%;width:8px;height:8px;background:'+hex+';--px:'+(Math.cos(angle)*r)+'px;--py:'+(Math.sin(angle)*r)+'px';
    board.appendChild(p);
    setTimeout(function(){p.remove()},500);
  }
}

function checkMatches(){
  var count={};slots.forEach(function(s,i){if(!s)return;var k=s.color.name;if(!count[k])count[k]=[];count[k].push(i)});
  var matchIndices=null;
  for(var cn in count){if(count[cn].length>=MATCH_COUNT){matchIndices=count[cn].slice(0,MATCH_COUNT);break}}
  if(matchIndices){processing=!0;flashSlots(matchIndices);sfxMatch();spawnParticles(50,90,slots[matchIndices[0]].color.hex);if(comboTimer)clearTimeout(comboTimer);combo++;
    var bonus=combo>1?combo*5:0;score+=30+bonus;$('scoreVal').textContent=score;$('comboCount').textContent='×'+combo;$('comboCount').classList.add('active');showScore(30+bonus);
    if(combo>=5){showCombo('🔥 '+combo+'连击！',combo);$('board').classList.add('shake');setTimeout(function(){$('board').classList.remove('shake')},350)}
    else if(combo>=3){showCombo('⚡ '+combo+'连击！',combo);$('board').classList.add('glow');setTimeout(function(){$('board').classList.remove('glow')},600)}
    if(combo>=5)document.body.classList.add('combo-fire');
    comboTimer=setTimeout(function(){combo=0;$('comboCount').textContent='×0';$('comboCount').classList.remove('active');document.body.classList.remove('combo-fire')},COMBO_TIMEOUT);
    setTimeout(function(){clearSlots(matchIndices);setTimeout(function(){updateRemain()},100)},100)}
  else{
    if(slots.length>=MAX_SLOTS){processing=!0;$('board').classList.add('shake');sfxLose();if(!gameMode){gameMode=1;updateModeUI();saveMode()}var remain=screws.filter(function(s){return!s.removed}).length;var pct=Math.round((totalScrewCount-remain)/totalScrewCount*100);setTimeout(function(){$('loseScore').textContent=score;$('losePct').textContent=pct+'%';$('overlayLose').classList.add('show');$('btnContinue').focus();processing=!1},400)}
    else{processing=!1}updateRemain()}
}

function showCombo(text,c){var el=$('comboPop');el.textContent=text;el.className='combo-pop';if(c>=21)el.classList.add('grand');else if(c>=16)el.classList.add('huge');else if(c>=11)el.classList.add('big');el.style.display='';el.getAnimations().forEach(function(a){a.cancel()});if(el.animate){el.animate([{opacity:1,transform:'translate(-50%,-50%) scale(0.4)'},{opacity:1,transform:'translate(-50%,-80%) scale(1.2)',offset:.5},{opacity:0,transform:'translate(-50%,-130%) scale(1)'}],{duration:600,easing:'ease-out',fill:'forwards'}).onfinish=function(){el.style.display='none'}}else{el.classList.add('show');setTimeout(function(){el.style.display='none';el.classList.remove('show')},600)}}

// ═══════ 种子随机数（每日挑战用） ═══════
function seedRandom(seed){
  var a=seed;
  return function(){
    var t=a+=0x6D2B79F5;
    t=Math.imul(t^t>>>15,t|1);
    t^=t+Math.imul(t^t>>>7,t|61);
    return((t^t>>>14)>>>0)/4294967296;
  };
}
function getDailySeed(){
  var d=new Date();
  return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}
function isDailyMode(){return location.search.indexOf('daily')>=0}

function generateLevel(){
  screws=[];slots=[];history=[];combo=0;processing=!1;starMoves=0;if(comboTimer){clearTimeout(comboTimer);comboTimer=null};isDailyChallenge=isDailyMode();var _origRandom=Math.random;if(isDailyChallenge){var _seeded=seedRandom(getDailySeed());Math.random=function(){return _seeded()}}
  var boardEl=$('board'),existing=boardEl.querySelectorAll('.screw,.hole');existing.forEach(function(el){el.remove()});
  var numColors=5+(level%4)+(gameMode?2:0),screwsPerColor=Math.round(3*level*(gameMode?1.5:1));
  var total=numColors*screwsPerColor,levelColors=COLORS.slice(0,numColors),screwList=[];
  for(var c=0;c<numColors;c++){for(var i=0;i<screwsPerColor;i++){screwList.push({color:levelColors[c]})}}
  for(var i=screwList.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=screwList[i];screwList[i]=screwList[j];screwList[j]=tmp}

  // 羊了个羊式分布：钟形曲线多层，中间层最多，顶层底层稀少，中心聚集
  var numLayers=Math.max(3,Math.floor(total/7));
  var mid=(numLayers-1)/2,sigma=numLayers/3,totalWeight=0,weights=[];
  for(var li=0;li<numLayers;li++){
    var w=Math.exp(-Math.pow((li-mid)/sigma,2));
    weights.push(w);totalWeight+=w;
  }
  var idx=0;
  for(var li=0;li<numLayers&&idx<total;li++){
    var count=li===numLayers-1?total-idx:Math.round(total*weights[li]/totalWeight);
    var used={};
    for(var b=0;b<count&&idx<total;b++){
      var spread=92,grid=5,x,y,attempts=0;  // 全关卡统一散布
      do{
        var edge=(100-spread)/2;
        x=edge+Math.random()*spread;y=edge+Math.random()*spread;
        var key=Math.round(x/grid)+'_'+Math.round(y/grid);
        attempts++;
      }while(used[key]&&attempts<30);
      used[key]=1;
      screws.push({id:idx,x:x,y:y,size:Math.max(10,22-Math.floor(level/3)*2-(gameMode?4:0)),layer:li,color:screwList[idx].color,removed:!1,blocked:!1,removing:!1});
      idx++;
    }
  }
  // Sort by layer for correct drawing order (layer 0 = top)
  screws.sort(function(a,b){return b.layer-a.layer});
  // Re-assign ids after sort
  screws.forEach(function(s,i){s.id=i});

  updateBlocked();
  // 确保每种颜色至少一个可点球（3匹配可行）
  for(var _rr=0;_rr<15;_rr++){
    var bad=levelColors.filter(function(lc){return !screws.some(function(s){return !s.removed&&!s.blocked&&s.color.name===lc.name})});
    if(bad.length===0)break;
    bad.forEach(function(bc){
      var blocked=screws.filter(function(s){return !s.removed&&s.blocked&&s.color.name===bc.name});
      blocked.forEach(function(s){s.blocked=!1});
    });
    updateBlocked();
  }
  // 可解性验证：不可解则重新生成（每日挑战模式跳过，保留原始难度）
  var retries=0,maxRetries=isDailyChallenge?0:10,solvable=false;
  while(retries<maxRetries){
    solvable=isSolvable();
    if(solvable)break;
    retries++;
    // 重新洗牌颜色分布
    for(var i=screwList.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=screwList[i];screwList[i]=screwList[j];screwList[j]=tmp}
    // 重新分配螺丝颜色
    var idx2=0;
    for(var li2=0;li2<numLayers&&idx2<total;li2++){
      var count2=li2===numLayers-1?total-idx2:Math.round(total*weights[li2]/totalWeight);
      for(var b2=0;b2<count2&&idx2<total;b2++){
        if(idx2<total){screws[idx2].color=screwList[idx2].color;idx2++}
      }
    }
    updateBlocked();
  }
  if(!solvable&&maxRetries>0){console.warn('Level '+level+' unsolvable after '+maxRetries+' retries, using last attempt')}

  totalScrewCount=total;$('totalCount').textContent=total;levelEntryScore=score;renderAll();updateSlotsUI();updateRemain();
  $('levelBadge').textContent='第 '+level+' 关'+(isDailyChallenge?' 🔥 每日 ▼':(gameMode?' 👿 ▼':' ▼'));$('comboCount').textContent='×0';$('scoreVal').textContent=score;
}

// ═══════ 遮罩算法：上层球中心覆盖下层球中心→遮挡；重叠>80%面积→blocked═══════
function circleOverlap(r1,r2,d){
  if(d>=r1+r2)return 0;
  if(d<=Math.abs(r1-r2))return Math.PI*Math.min(r1,r2)*Math.min(r1,r2);
  var a=r1*r1*Math.acos((d*d+r1*r1-r2*r2)/(2*d*r1));
  var b=r2*r2*Math.acos((d*d+r2*r2-r1*r1)/(2*d*r2));
  var c=0.5*Math.sqrt((-d+r1+r2)*(d+r1-r2)*(d-r1+r2)*(d+r1+r2));
  return a+b-c;
}
function updateBlocked(removedId){
  // 增量模式：只更新受移除螺丝影响的下层螺丝
  if(removedId!==undefined){
    var rs=screws.find(function(s){return s.id===removedId});
    if(!rs)return;
    var rr=rs.size/2;
    for(var i=0;i<screws.length;i++){
      var s=screws[i];if(s.removed||s.layer<=rs.layer)continue;
      var dx=s.x-rs.x,dy=s.y-rs.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<rr+s.size/2){
        var tc=0,myA=Math.PI*(s.size/2)*(s.size/2);
        for(var j=0;j<screws.length;j++){
          var o=screws[j];if(o.removed||o.id===removedId||o.layer>=s.layer)continue;
          var dx2=s.x-o.x,dy2=s.y-o.y,d2=Math.sqrt(dx2*dx2+dy2*dy2);
          if(d2<(s.size/2)+o.size/2)tc+=circleOverlap(s.size/2,o.size/2,d2);
        }
        var was=s.blocked;
        s.blockedPct=Math.min(1,tc/myA);
        s.blocked=s.blockedPct>Math.max(0.35,0.5-Math.floor(level/10)*0.05);
        if(was!==s.blocked)syncScrewDOM(s);
      }
    }
    return;
  }
  // 全量模式
  screws.forEach(function(s){s.blocked=!1;s.blockedPct=0});
  var r=screws[0]?screws[0].size/2:10;
  for(var i=0;i<screws.length;i++){
    var s=screws[i];if(s.removed)continue;
    var totalCovered=0,myArea=Math.PI*r*r;
    for(var j=0;j<screws.length;j++){
      var o=screws[j];if(o.removed||o.layer>=s.layer)continue;
      var dx=s.x-o.x,dy=s.y-o.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<r+o.size/2)totalCovered+=circleOverlap(r,o.size/2,dist);
    }
    s.blockedPct=Math.min(1,totalCovered/myArea);
    s.blocked=s.blockedPct>Math.max(0.35,0.5-Math.floor(level/10)*0.05);
  }
  screws.forEach(function(s){if(!s.removed)syncScrewDOM(s)});
}
function syncScrewDOM(s){
  var el=board.querySelector('.screw[data-id="'+s.id+'"]');
  if(!el)return;
  if(s.blocked)el.classList.add('blocked');
  else{if(el.classList.contains('blocked')){el.style.transition='none';el.classList.remove('blocked');el.offsetHeight;el.style.transition=''}else el.classList.remove('blocked')}

}

function isSolvable(){
  // --- DFS 回溯求解器：验证关卡数学可解 ---
  var maxDepth = 300;
  var visited = {};
  var result = {solvable:false};
  var startTime = Date.now();
  var timeLimit = 3000; // 3秒超时

  // 预计算遮挡关系图（单向：上→下）
  var N = screws.length;
  var coveredBy = {}; // screwId → [遮挡它的screwId列表]
  var blockThreshold = Math.max(0.35, 0.5 - Math.floor(level / 10) * 0.05);
  for (var i = 0; i < N; i++) {
    if (screws[i].removed) continue;
    coveredBy[screws[i].id] = [];
  }
  for (var i = 0; i < N; i++) {
    var s = screws[i];
    if (s.removed) continue;
    var r = s.size / 2;
    var myArea = Math.PI * r * r;
    var totalCovered = 0;
    var covering = [];
    for (var j = 0; j < N; j++) {
      var o = screws[j];
      if (o.removed || o.id === s.id) continue;
      if (o.layer >= s.layer) continue;
      var dx = s.x - o.x, dy = s.y - o.y, dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < r + o.size / 2) {
        covering.push(o.id);
        totalCovered += circleOverlap(r, o.size / 2, dist);
      }
    }
    if (totalCovered / myArea > blockThreshold) {
      coveredBy[s.id] = covering.map(function(cid) {
        return {id: cid, area: 0}; // area will be computed when needed
      });
      // Pre-compute individual overlap areas for incremental unblock check
      for (var ci = 0; ci < coveredBy[s.id].length; ci++) {
        var oid = coveredBy[s.id][ci].id;
        var o = screws.find(function(x) { return x.id === oid; });
        if (o) {
          var dx2 = s.x - o.x, dy2 = s.y - o.y, dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
          coveredBy[s.id][ci].area = circleOverlap(r, o.size / 2, dist2) / myArea;
        }
      }
    }
  }

  // 判断screw当前是否被遮挡（累计覆盖率）
  function isBlocked(sid, removed) {
    var cb = coveredBy[sid];
    if (!cb || cb.length === 0) return false;
    var sum = 0;
    for (var i = 0; i < cb.length; i++) {
      if (!removed[cb[i].id]) sum += cb[i].area;
    }
    return sum > blockThreshold;
  }

  function encode(remainingCount, slotsColors) {
    return remainingCount + '|' + slotsColors.slice().sort().join(',');
  }

  function dfs(removed, slotsArr, remainingCount, depth) {
    if (Date.now() - startTime > timeLimit) return false;
    if (depth > maxDepth) return false;
    if (remainingCount === 0 && slotsArr.length === 0) {
      result.solvable = true;
      return true;
    }

    var key = encode(remainingCount, slotsArr);
    if (visited[key]) return false;
    visited[key] = true;

    // 收集未遮挡的螺丝
    var candidates = [];
    for (var i = 0; i < N; i++) {
      var sid = screws[i].id;
      if (removed[sid]) continue;
      if (!isBlocked(sid, removed)) {
        candidates.push(i);
      }
    }

    // 启发式排序：槽内同色优先
    candidates.sort(function(a, b) {
      var ca = screws[a], cb = screws[b];
      var inA = 0, inB = 0;
      for (var i = 0; i < slotsArr.length; i++) {
        if (slotsArr[i] === ca.color.name) inA++;
        if (slotsArr[i] === cb.color.name) inB++;
      }
      return inB - inA;
    });

    for (var ci = 0; ci < candidates.length; ci++) {
      var idx = candidates[ci];
      var screw = screws[idx];

      // 槽满检查
      if (slotsArr.length >= 5) {
        var matchCount = 0;
        for (var i = 0; i < slotsArr.length; i++) {
          if (slotsArr[i] === screw.color.name) matchCount++;
        }
        if (matchCount < 2) continue;
      }

      // 模拟
      var newSlots = slotsArr.slice();
      newSlots.push(screw.color.name);
      // 消除
      var cnt = {};
      for (var i = 0; i < newSlots.length; i++) {
        cnt[newSlots[i]] = (cnt[newSlots[i]] || 0) + 1;
      }
      for (var cn in cnt) {
        if (cnt[cn] >= 3) {
          newSlots = newSlots.filter(function(c) { return c !== cn; });
          break;
        }
      }

      var newRemoved = {};
      for (var k in removed) newRemoved[k] = removed[k];
      newRemoved[screw.id] = true;

      if (dfs(newRemoved, newSlots, remainingCount - 1, depth + 1)) {
        return true;
      }
    }
    return false;
  }

  var removedInit = {};
  for (var i = 0; i < N; i++) {
    if (screws[i].removed) removedInit[screws[i].id] = true;
  }
  var remainingInit = N - Object.keys(removedInit).length;
  var slotsInit = [];
  for (var i = 0; i < slots.length; i++) {
    if (slots[i]) slotsInit.push(slots[i].color.name);
  }

  return dfs(removedInit, slotsInit, remainingInit, 0) || (function() {
    console.warn('Level '+level+' solver timeout/unsolvable');
    return false;
  })();
}
function getLayerOpacity(screw){
  var layers=[],seen={};
  screws.forEach(function(s){if(!s.removed&&!seen[s.layer]){seen[s.layer]=1;layers.push(s.layer)}});
  layers.sort(function(a,b){return a-b});
  var rank=layers.indexOf(screw.layer);
  return Math.max(0.25,1-rank*0.15);
}

function winLevel(){sfxWin();var bonus=level*50;
  // ⭐ 双维评级（bonus前的真实分数）：步数效率(60%) + 得分倍率(40%)
  var efficiency=starMoves>0?Math.min(totalScrewCount/starMoves,1):1;
  var baseScore=totalScrewCount*10;
  var scoreRate=score>0?Math.min(score/baseScore/1.5,1):0;
  var combined=efficiency*0.6+scoreRate*0.4;
  var stars=combined>=0.85?3:combined>=0.70?2:1;
  var starStr='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  var effPct=Math.round(efficiency*100);
  var scoreX=((score-levelEntryScore)/baseScore).toFixed(1);
  $('winStars').innerHTML=starStr+'<br><span style="font-size:14px;color:#94a3b8">步效'+effPct+'%  得分'+scoreX+'x</span>';
  // 本关理论最高倍率
  var matches=Math.floor(totalScrewCount/3);
  var maxCombo=matches>1?5*matches*(matches-1)/2:0;
  var maxX=((totalScrewCount*10+maxCombo)/(totalScrewCount*10)).toFixed(1);
  $('winStarInfo').innerHTML='⭐⭐⭐≥85% &nbsp;⭐⭐≥70% &nbsp;|&nbsp;最高得分'+maxX+'x';
  score+=bonus;
  var cleared=JSON.parse(localStorage.getItem('game_cleared')||'[]'),firstClear=!cleared.includes(level);
  if(firstClear){coins+=10;props.undo++;cleared.push(level);localStorage.setItem('game_cleared',JSON.stringify(cleared));$('winSub').textContent='第 '+level+' 关完成 +'+bonus+'分 🪙+10 ↩️+1'}
  else{$('winSub').textContent='第 '+level+' 关完成 +'+bonus+'分（重复通关无奖励）'}
  gameMode=0;updateModeUI();saveMode();saveProps();$('scoreVal').textContent=score;$('coinVal').textContent=coins;$('winScore').textContent=score;$('overlayWin').classList.add('show');updatePropUI();submitScore(score);clearAutoSave()}

var _simRunning=!1,_simTimer=null;
function stopSimulate(){_simRunning=!1;if(_simTimer){clearTimeout(_simTimer);_simTimer=null}$('simBadge')&&$('simBadge').remove()}
function startSimulate(){
  $('overlayLose').classList.remove('show');restartLevel();
  setTimeout(function(){
    _simRunning=!0;
    var badge=document.createElement('div');
    badge.id='simBadge';badge.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:200;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:4px 16px;border-radius:20px;font-size:13px;font-weight:700;pointer-events:none;animation:pulse 1.2s ease-in-out infinite';
    badge.textContent='🤖 AI 演示中... 点击任意处停止';
    document.body.appendChild(badge);
    document.addEventListener('click',stopSimOnClick,{once:!0});
    document.addEventListener('keydown',stopSimOnClick,{once:!0});
    simStep();
  },300);
}
function stopSimOnClick(){if(_simRunning){stopSimulate();sfxClick()}}
function simStep(){
  if(!_simRunning)return;
  if(paused){_simTimer=setTimeout(simStep,200);return}
  // Check win
  var active=screws.filter(function(s){return!s.removed});
  if(active.length===0){stopSimulate();sfxMatch();return}
  // Check lose
  if(document.getElementById('overlayLose').classList.contains('show')){
    // AI failed — auto restart
    $('overlayLose').classList.remove('show');
    clearAutoSave();generateLevel();
    _simTimer=setTimeout(simStep,400);
    return;
  }
  // AI strategy: greedy best pick
  var slotColors={};
  slots.forEach(function(s){if(s){slotColors[s.color.name]=(slotColors[s.color.name]||0)+1}});
  var unblocked=screws.filter(function(s){return!s.removed&&!s.blocked});
  if(unblocked.length===0){stopSimulate();return}
  // Priority: colors with 2 in slots → instant match
  var best=null;
  for(var cn in slotColors){if(slotColors[cn]>=2){for(var i=0;i<unblocked.length;i++){if(unblocked[i].color.name===cn){best=unblocked[i];break}}if(best)break}}
  // Second: colors already in slots
  if(!best){for(var i=0;i<unblocked.length;i++){if(slotColors[unblocked[i].color.name]){best=unblocked[i];break}}}
  // Third: random
  if(!best){best=unblocked[Math.floor(Math.random()*unblocked.length)]}
  // Highlight pick briefly
  var el=document.querySelector('#board .screw[data-id="'+best.id+'"]');
  if(el){el.style.outline='2px solid #6366f1';el.style.outlineOffset='2px';setTimeout(function(){el.style.outline='';el.style.outlineOffset=''},250)}
  processClick(best);
  _simTimer=setTimeout(simStep,180);
}

const CHECKIN_REWARDS=[
  {coins:10,icon:'🪙',label:'+10金币'},
  {coins:15,props:{undo:1},icon:'🪙↩️',label:'+15金币 +撤回'},
  {coins:20,icon:'🪙',label:'+20金币'},
  {coins:25,props:{bomb:1},icon:'🪙💣',label:'+25金币 +炸弹'},
  {coins:30,icon:'🪙',label:'+30金币'},
  {coins:40,props:{peek:1},icon:'🪙👁️',label:'+40金币 +透视'},
  {coins:50,props:{lightning:1,shuffle:1},icon:'🎁',label:'+50金币 +闪电+洗牌'}
];
function getCheckinState(){
  var phone=localStorage.getItem('game_phone')||'guest';
  try{return JSON.parse(localStorage.getItem('checkin_'+phone)||'{}')}catch(e){return{}}
}
function saveCheckinState(s){
  var phone=localStorage.getItem('game_phone')||'guest';
  localStorage.setItem('checkin_'+phone,JSON.stringify(s))
}
function showCheckin(){
  var cs=getCheckinState(),today=new Date().toDateString();
  if(cs.lastDate&&cs.lastDate!==today){
    var last=new Date(cs.lastDate),now=new Date(today);
    var diff=(now-last)/86400000;
    if(diff>1){cs={claimed:[],streak:0,lastDate:''};saveCheckinState(cs)}
  }
  var grid=$('checkinGrid'),btn=$('checkinBtn'),html='',isLogin=!!authState.token;
  // 游客模式：全部显示为待签到
  var displayState=isLogin?cs:{claimed:[],streak:0,lastDate:''};
  var alreadyChecked=displayState.lastDate===today;
  for(var i=0;i<7;i++){
    var cls='checkin-day',icon=CHECKIN_REWARDS[i].icon,label='第'+(i+1)+'天';
    if(displayState.claimed&&displayState.claimed.includes(i)){cls+=' claimed';icon='✅';label='已领'}
    else if(!alreadyChecked&&i===(displayState.streak||0)){cls+=' today'}
    else{cls+=' locked'}
    html+='<div class="'+cls+'"'+(cls.includes('today')&&isLogin?' onclick="doCheckin()"':'')+'><span class="cd-icon">'+icon+'</span><span class="cd-label">'+label+'</span></div>';
  }
  grid.innerHTML=html;
  if(!isLogin){btn.textContent='🔒 请先登录';btn.disabled=!0}
  else if(alreadyChecked){btn.textContent='✅ 今日已签';btn.disabled=!0}
  else{btn.textContent='🎁 签到领奖';btn.disabled=!1}
  $('checkinOverlay').classList.add('show');
}
function hideCheckin(){$('checkinOverlay').classList.remove('show')}
let checkinLock=!1;
function doCheckin(){
  if(!authState.token){hideCheckin();showLogin();return}
  if(checkinLock)return;checkinLock=!0;
  var cs=getCheckinState(),today=new Date().toDateString();
  if(cs.lastDate===today){checkinLock=!1;return} // 今天已签过
  var idx=cs.streak||0;
  var r=CHECKIN_REWARDS[idx];
  coins+=r.coins;
  if(r.props){for(var k in r.props)props[k]=(props[k]||0)+r.props[k]}
  saveProps();updatePropUI();$('coinVal').textContent=coins;
  if(!cs.claimed)cs.claimed=[];
  cs.claimed.push(idx);cs.streak=(idx+1)%7;cs.lastDate=today;
  saveCheckinState(cs);
  sfxBuy();showCheckin();
  checkinLock=!1;
}

function generateShareCard(){

  bg.addColorStop(0,'#0f0f2d');bg.addColorStop(.5,'#1a1a3e');bg.addColorStop(1,'#0d0d1f');
  ctx.fillStyle=bg;ctx.fillRect(0,0,600,800);
  ctx.fillStyle='rgba(255,255,255,.15)';
  for(var i=0;i<60;i++){var sx=Math.random()*600,sy=Math.random()*400,sr=Math.random()*2+.5;ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill()}
  ctx.fillStyle='#fbbf24';ctx.font='bold 46px -apple-system,sans-serif';ctx.textAlign='center';
  ctx.fillText('🎉 萌糖消了个消',300,80);
  ctx.fillStyle='#c7d2fe';ctx.font='bold 28px -apple-system,sans-serif';
  ctx.fillText('第 '+level+' 关 通关！',300,140);
  ctx.strokeStyle='rgba(251,191,36,.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(100,170);ctx.lineTo(500,170);ctx.stroke();
  ctx.fillStyle='#fbbf24';ctx.font='bold 80px -apple-system,sans-serif';
  ctx.fillText(score,300,270);
  ctx.fillStyle='#94a3b8';ctx.font='20px -apple-system,sans-serif';
  ctx.fillText('总得分',300,310);
  var details=[{label:'金币',val:'🪙 '+coins},{label:'连击',val:'×'+combo},{label:'萌糖颜色',val:COLORS.length+'种'}];
  var dx=80;
  for(var d=0;d<details.length;d++){
    var item=details[d];
    ctx.fillStyle='rgba(255,255,255,.06)';roundRect(ctx,dx,350,120,80,12);ctx.fill();
    ctx.fillStyle='#64748b';ctx.font='13px -apple-system,sans-serif';ctx.fillText(item.label,dx+60,390);
    ctx.fillStyle='#e2e8f0';ctx.font='bold 22px -apple-system,sans-serif';ctx.fillText(item.val,dx+60,420);
    dx+=150;
  }
  var now=new Date(),ds=now.getFullYear()+'.'+(now.getMonth()+1)+'.'+now.getDate();
  ctx.fillStyle='#64748b';ctx.font='16px -apple-system,sans-serif';ctx.fillText(ds,300,500);
  ctx.fillStyle='rgba(251,191,36,.1)';roundRect(ctx,60,550,480,180,20);ctx.fill();
  ctx.fillStyle='#94a3b8';ctx.font='16px -apple-system,sans-serif';
  ctx.fillText('扫码来挑战，看你能过几关！',300,600);
  ctx.fillStyle='#fbbf24';ctx.font='bold 24px -apple-system,sans-serif';
  ctx.fillText('ct256.cn/unscrew',300,650);
  for(var s=0;s<5;s++){var sc=COLORS[s%COLORS.length];ctx.fillStyle=sc.hex;ctx.beginPath();ctx.arc(80+s*110,730,22,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.arc(80+s*110,730,22,0,Math.PI*2);ctx.fill();ctx.fillStyle=sc.light;ctx.beginPath();ctx.arc(72+s*110,720,6,0,Math.PI*2);ctx.fill()}
  $('shareImg').src=cv.toDataURL('image/png');
  $('shareOverlay').classList.add('show');
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

let tutIdx=0,tutDone=localStorage.getItem('tut_done');
function showTutorial(){
  if(tutDone||level>3)return;
  tutIdx=0;renderTut();$('tutOverlay').classList.add('show');
}
function renderTut(){
  var s=TUT_STEPS[tutIdx];$('tutIcon').textContent=s.icon;$('tutTitle').textContent=s.title;$('tutDesc').textContent=s.desc;
  var dots='';
  for(var i=0;i<TUT_STEPS.length;i++)dots+='<div class="tut-dot'+(i===tutIdx?' active':'')+'"></div>';
  $('tutDots').innerHTML=dots;
  $('tutNextBtn').textContent=tutIdx===TUT_STEPS.length-1?'🎮 开始游戏':'下一步';
}
function nextTutorial(){
  tutIdx++;
  if(tutIdx>=TUT_STEPS.length){skipTutorial();return}
  renderTut();
}

function initGame(){var m=location.search.match(/[?&]level=(\d+)/);var _ul=!!m;if(m){level=parseInt(m[1])||1}
  gameMode=parseInt(localStorage.getItem('game_mode'))||0;updateModeUI();if(!authState.token){_ul||(level=1);score=0;coins=0;props={undo:0,bomb:0,peek:0,lightning:0,shuffle:0};localStorage.removeItem('game_pause');localStorage.removeItem('game_cleared')}
  else{
  var today=new Date().toDateString(),last=localStorage.getItem('game_date');
  if(last!==today){coins=Math.max(coins,30);props={undo:Math.max(props.undo,5),bomb:Math.max(props.bomb,3),peek:Math.max(props.peek,3),lightning:Math.max(props.lightning,3),shuffle:Math.max(props.shuffle,3)};saveProps();localStorage.setItem('game_date',today);clearPauseState()}
  else{try{var d=JSON.parse(localStorage.getItem('game_props')||'{}');if(typeof d.level==='number'&&!_ul)level=d.level;if(typeof d.score==='number')score=d.score;if(typeof d.coins==='number')coins=d.coins}catch(e){}}
  if(loadPauseState()){updatePropUI();$('levelBadge').textContent='第 '+level+' 关 ▼';$('scoreVal').textContent=score;$('coinVal').textContent=coins;return}
  }
  applySkin(getSkin());buildSlots();if(isDailyMode()){clearAutoSave();generateLevel()}else if(!loadAutoSave()){generateLevel()}else{$('levelBadge').textContent='第 '+level+' 关 ▼';$('scoreVal').textContent=score;$('coinVal').textContent=coins;updatePropUI()}setTimeout(function(){showTutorial()},600);$('btnNext').onclick=nextLevel;$('btnReplay').onclick=restartLevel;$('btnRetry').onclick=restartLevel;$('btnContinue').onclick=restartLevel;if(authState.token)loadProps();updatePropUI();$('coinVal').textContent=coins;updateUserUI()}

(function(){

      var key=Object.keys(SFX_T)[i];
      b.classList.toggle('active',key===soundTheme);
    });
  };
  function syncVolUI(){
    var v=Math.round((masterGain?masterGain.gain.value:0.7)*100);
    document.getElementById('volLabel').textContent=v;
    var tb=document.getElementById('themeBtn');
    if(v===0){soundOn=!1;tb.textContent='🔇';tb.classList.add('muted')}
    else if(!soundOn){soundOn=!0;tb.textContent='🔊';tb.classList.remove('muted')}
  }
  function changeVol(d){
    var cur=masterGain?masterGain.gain.value:0.7,v=Math.round(Math.max(0,Math.min(1,cur+d/100))*100)/100;
    if(masterGain)masterGain.gain.value=v;
    localStorage.setItem('sfx_volume',v);
    syncVolUI();
  }
  document.getElementById('volDown').addEventListener('click',function(e){e.stopPropagation();changeVol(-5)});
  document.getElementById('volUp').addEventListener('click',function(e){e.stopPropagation();changeVol(5)});
  syncVolUI();
  document.addEventListener('click',function(e){if(!p.contains(e.target)&&e.target.id!=='soundBtn')p.classList.remove('show');var lp=document.getElementById('levelPicker');if(lp&&!lp.contains(e.target)&&e.target.id!=='levelBadge')lp.classList.remove('show')});
})();
